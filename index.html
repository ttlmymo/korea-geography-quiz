<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>수도권 지리 마스터 퀴즈</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif; }
  #app { display: flex; width: 100vw; height: 100vh; }
  #map-container { flex: 1; height: 100%; background: #e8eef3; }
  #panel { width: 400px; height: 100%; background: #1e293b; color: #f1f5f9; display: flex; flex-direction: column; padding: 24px; gap: 14px; overflow-y: auto; }
  #panel h1 { font-size: 20px; font-weight: 800; }
  .row { display: flex; justify-content: space-between; align-items: center; font-size: 14px; color: #94a3b8; }
  #progress-bar { height: 6px; background: #334155; border-radius: 3px; overflow: hidden; }
  #progress-fill { height: 100%; width: 0%; background: #f97316; transition: width .3s; }
  .badge { display:inline-block; padding:3px 10px; border-radius:999px; font-size:12px; font-weight:700; margin-bottom:8px; }
  .badge.gu { background:#1e3a8a; color:#bfdbfe; }
  .badge.dong { background:#713f12; color:#fde68a; }
  #question { font-size: 17px; line-height: 1.5; min-height: 50px; background: #0f172a; padding: 16px; border-radius: 12px; }
  #legend { font-size:12px; color:#cbd5e1; display:flex; flex-direction:column; gap:4px; }
  #legend .lg { display:flex; align-items:center; gap:8px; }
  #legend .sw { width:14px; height:14px; border-radius:3px; border:1px solid rgba(255,255,255,.3); }
  #options { display: flex; flex-direction: column; gap: 10px; }
  .option-btn { text-align: left; padding: 14px 16px; border: 2px solid #334155; background: #0f172a; color: #f1f5f9; border-radius: 12px; font-size: 15px; cursor: pointer; transition: all .15s; }
  .option-btn:hover:not(:disabled) { border-color: #f97316; }
  .option-btn:disabled { cursor: default; }
  .option-btn.correct { border-color: #22c55e; background: #14532d; }
  .option-btn.wrong { border-color: #ef4444; background: #450a0a; }
  #explain { font-size:13px; line-height:1.5; padding:12px 14px; border-radius:10px; background:#0f172a; border-left:3px solid #38bdf8; color:#e2e8f0; }
  button.primary { padding: 14px; background: #f97316; color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; }
  button.secondary { padding: 12px; background: #334155; color: #f1f5f9; border: none; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; }
  #next-btn:disabled { background: #475569; cursor: default; }
  #result .score { font-size: 44px; font-weight: 900; color: #f97316; text-align:center; }
  #result-msg { text-align:center; font-size:15px; }
  #report { display:flex; flex-direction:column; gap:8px; margin-top:8px; }
  .report-item { background:#0f172a; border-radius:10px; padding:10px 12px; font-size:13px; line-height:1.5; border-left:3px solid #475569; }
  .report-item.ok { border-left-color:#22c55e; }
  .report-item.no { border-left-color:#ef4444; }
  .report-item .head { font-weight:700; margin-bottom:2px; }
  .report-item .sub { color:#94a3b8; }
  #loading { position: absolute; inset: 0; display: flex; flex-direction: column; gap: 12px; align-items: center; justify-content: center; background: rgba(15,23,42,.9); color: #fff; font-size: 18px; z-index: 50; text-align: center; padding: 20px; }
  .spinner { width: 36px; height: 36px; border: 4px solid #334155; border-top-color: #f97316; border-radius: 50%; animation: spin 0.9s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .hidden { display: none !important; }
  #verify-result { margin-top: 8px; font-size: 12px; line-height: 1.6; }
  #diag { font-size: 12px; color: #fca5a5; margin-top: 8px; }
</style>
</head>
<body>
<div id="app">
  <div id="map-container"></div>
  <div id="panel">
    <h1>🗺️ 수도권 지리 마스터</h1>

    <div id="start-screen">
      <p style="color:#94a3b8; line-height:1.6;">
        매 문제마다 <b>구·시·군</b> 또는 <b>읍·면·동</b>이 랜덤 출제됩니다. 읍·면·동 문제에서는 시·구·동이 색으로 구분돼 한눈에 위치를 익힐 수 있어요.
      </p>
      <button id="start-btn" class="primary">게임 시작</button>
      <button id="verify-btn" class="secondary" style="margin-top:10px;">🔍 전체 검증 (구 + 읍·면·동)</button>
      <div id="diag"></div>
      <div id="verify-result"></div>
    </div>

    <div id="quiz-screen" class="hidden">
      <div class="row">
        <span id="q-counter">1 / 10</span>
        <span id="score-label">점수 0</span>
      </div>
      <div id="progress-bar"><div id="progress-fill"></div></div>
      <div>
        <span id="q-badge" class="badge gu">구·시·군</span>
        <div id="question"></div>
      </div>
      <div id="legend" class="hidden">
        <div class="lg"><span class="sw" style="background:#fed7aa;"></span> 시 전체</div>
        <div class="lg"><span class="sw" style="background:#f97316;"></span> 소속 구</div>
        <div class="lg"><span class="sw" style="background:#dc2626;"></span> 정답 읍·면·동 (빨간 점)</div>
      </div>
      <div id="options"></div>
      <div id="explain" class="hidden"></div>
      <button id="next-btn" class="primary" disabled>다음 문제</button>
    </div>

    <div id="result-screen" class="hidden">
      <div id="result">
        <div style="text-align:center; color:#94a3b8;">최종 점수</div>
        <div class="score"><span id="final-score">0</span> / 100</div>
        <div id="result-msg"></div>
      </div>
      <h2 style="font-size:16px; margin-top:8px;">📋 결과지</h2>
      <div id="report"></div>
      <button id="restart-btn" class="primary" style="margin-top:8px;">다시 하기</button>
    </div>
  </div>
</div>

<div id="loading">
  <div class="spinner"></div>
  <div id="loading-text">지도 및 경계 데이터를 불러오는 중…</div>
</div>

  {name:"광주시", matchName:"광주시", sido:"41", group:"gg-city"},

/* ===========================================================
   전역 상태
=========================================================== */
let map = null, centerMarker = null;
let highlightedFeatures = [];
const featuresBySgg = {}, codeByKey = {}, featuresBySi = {};
const dongList = [], dongsBySgg = {};

const SIDO_NAME = { "11":"서울특별시", "28":"인천광역시", "41":"경기도" };

let quizSet = [], currentIndex = 0, score = 0, answered = false;
let answerLog = [];   // 결과지용 기록

function siNameOf(sggnm) {
  const m = sggnm.match(/^(.*?[시군])/);
  return m ? m[1] : sggnm;
}

/* ===========================================================
   지도 초기화
=========================================================== */
function initMap() {
  map = new naver.maps.Map("map-container", {
    center: new naver.maps.LatLng(37.5642, 127.0016),
    zoom: 10, minZoom: 8, maxZoom: 15,
    mapTypes: new naver.maps.MapTypeRegistry({
      "normal_no_labels": naver.maps.NaverStyleMapTypeOptions.getNormalMap({ overlayType: "bg.ol" })
    }),
    mapTypeId: "normal_no_labels",
    scaleControl: false, logoControl: true, mapDataControl: false, zoomControl: false
  });
}

/* ===========================================================
   데이터 로드 + 인덱스
=========================================================== */
async function loadAllGeoData() {
  map.data.setStyle(() => ({ fillOpacity: 0, strokeWeight: 0, clickable: false }));
  const geojsons = await Promise.all(GEOJSON_FILES.map(async (url) => {
    const res = await fetch(url);
    if (!res.ok) throw new Error("GeoJSON 로드 실패: " + url);
    return res.json();
  }));
  geojsons.forEach((g) => map.data.addGeoJson(g));

  map.data.forEach((feature) => {
    const sgg = feature.getProperty("sgg");
    const sggnm = feature.getProperty("sggnm");
    const sido = feature.getProperty("sido");
    const adm_nm = feature.getProperty("adm_nm");
    if (!sgg) return;

    if (!featuresBySgg[sgg]) featuresBySgg[sgg] = [];
    featuresBySgg[sgg].push(feature);
    if (sggnm && sido) codeByKey[sido + "|" + sggnm] = sgg;

    if (sggnm && sido) {
      const siKey = sido + "|" + siNameOf(sggnm);
      if (!featuresBySi[siKey]) featuresBySi[siKey] = [];
      featuresBySi[siKey].push(feature);
    }
    if (adm_nm) {
      const parts = adm_nm.trim().split(/\s+/);
      const dongName = parts[parts.length - 1];
      const dong = { dongName, sgg, sido, sggnm, feature };
      dongList.push(dong);
      if (!dongsBySgg[sgg]) dongsBySgg[sgg] = [];
      dongsBySgg[sgg].push(dong);
    }
  });
  DB.forEach((item) => { item.sggCode = codeByKey[item.sido + "|" + item.matchName] || null; });
}

/* ===========================================================
   하이라이트
=========================================================== */
function clearHighlight() {
  highlightedFeatures.forEach((f) => map.data.revertStyle(f));
  highlightedFeatures = [];
  if (centerMarker) { centerMarker.setMap(null); centerMarker = null; }
}
function highlightGu(feats) {
  clearHighlight();
  feats.forEach((f) => { map.data.overrideStyle(f, COLOR_GU); highlightedFeatures.push(f); });
  fitToFeatures(feats);
}
function highlightDong(dong) {
  clearHighlight();
  const siFeats = featuresBySi[dong.sido + "|" + siNameOf(dong.sggnm)] || [];
  const guFeats = featuresBySgg[dong.sgg] || [];
  siFeats.forEach((f) => { map.data.overrideStyle(f, COLOR_SI); highlightedFeatures.push(f); });
  guFeats.forEach((f) => { map.data.overrideStyle(f, COLOR_GU); });
  map.data.overrideStyle(dong.feature, COLOR_DONG);
  if (!highlightedFeatures.includes(dong.feature)) highlightedFeatures.push(dong.feature);
  fitToFeatures(guFeats.length ? guFeats : [dong.feature]);
  const c = featureCenter(dong.feature);
  if (c) centerMarker = new naver.maps.Marker({
    position: c, map: map,
    icon: { content: '<div style="width:16px;height:16px;background:#dc2626;border:3px solid #fff;border-radius:50%;box-shadow:0 0 8px rgba(0,0,0,.6);"></div>', anchor: new naver.maps.Point(8, 8) }
  });
}
function featureCenter(f) {
  const b = new naver.maps.LatLngBounds(); let has = false;
  const json = f.toGeoJson ? f.toGeoJson() : null;
  if (json && json.geometry) collectCoords(json.geometry, (lng, lat) => { b.extend(new naver.maps.LatLng(lat, lng)); has = true; });
  return has ? b.getCenter() : null;
}
function fitToFeatures(feats) {
  const b = new naver.maps.LatLngBounds(); let has = false;
  feats.forEach((f) => {
    const json = f.toGeoJson ? f.toGeoJson() : null;
    if (!json || !json.geometry) return;
    collectCoords(json.geometry, (lng, lat) => { b.extend(new naver.maps.LatLng(lat, lng)); has = true; });
  });
  if (!has) return;
  map.morph(b.getCenter(), optimalZoom(feats), { duration: 500, easing: "easeOutCubic" });
}
function collectCoords(geometry, cb) {
  const t = geometry.type, c = geometry.coordinates;
  const walk = (arr, depth) => { if (depth === 0) { cb(arr[0], arr[1]); return; } arr.forEach((a) => walk(a, depth - 1)); };
  if (t === "Polygon") walk(c, 2); else if (t === "MultiPolygon") walk(c, 3);
}
function optimalZoom(feats) {
  const n = feats.length;
  if (n === 1) return 13;
  if (n >= 15) return 11;
  if (n >= 6) return 12;
  return 13;
}

/* ===========================================================
   전체 검증
=========================================================== */
function verifyAll() {
  const out = document.getElementById("verify-result");
  const problems = []; let okCount = 0;
  DB.forEach((item) => {
    if (!item.sggCode) { problems.push(`❌ [구/매칭실패] ${item.name}`); return; }
    const feats = featuresBySgg[item.sggCode];
    if (!feats || !feats.length) { problems.push(`❌ [구/경계없음] ${item.name}`); return; }
    const names = new Set(feats.map((f) => f.getProperty("sggnm")));
    if (names.size !== 1) { problems.push(`⚠ [구/혼합오염] ${item.name} → ${[...names].join(", ")}`); return; }
    if ([...names][0] !== item.matchName) { problems.push(`⚠ [구/이름불일치] ${item.name}`); return; }
    okCount++;
  });
  let html = `<div style="color:#22c55e; font-weight:700;">✅ 구 정상: ${okCount} / ${DB.length}</div>`;
  html += `<div style="color:#22c55e; margin-top:4px;">✅ 읍·면·동 총: ${dongList.length}개</div>`;
  if (problems.length) {
    html += `<div style="color:#fca5a5; margin-top:8px; max-height:260px; overflow-y:auto;">`;
    problems.forEach((p) => { html += `<div>${p}</div>`; }); html += `</div>`;
  } else html += `<div style="color:#22c55e; margin-top:6px;">🎉 모든 항목 정상!</div>`;
  out.innerHTML = html;
}

/* ===========================================================
   퀴즈 로직
=========================================================== */
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
  return a;
}

function startGame() {
  quizSet = []; answerLog = [];
  const validGu = DB.filter((d) => d.sggCode);
  for (let i = 0; i < 10; i++) quizSet.push(Math.random() < DONG_RATIO ? makeDongQuestion() : makeGuQuestion(validGu));
  currentIndex = 0; score = 0;
  document.getElementById("start-screen").classList.add("hidden");
  document.getElementById("result-screen").classList.add("hidden");
  document.getElementById("quiz-screen").classList.remove("hidden");
  loadQuestion();
}

function makeGuQuestion(validGu) {
  const target = validGu[Math.floor(Math.random() * validGu.length)];
  let pool = DB.filter((d) => d.group === target.group && d.matchName !== target.matchName && d.sggCode);
  let wrongs = shuffle(pool).slice(0, 3);
  if (wrongs.length < 3) {
    const extra = shuffle(DB.filter((d) => d.sggCode && d.matchName !== target.matchName && !wrongs.includes(d))).slice(0, 3 - wrongs.length);
    wrongs = wrongs.concat(extra);
  }
  return {
    type:"gu", answerLabel: target.name, feats: featuresBySgg[target.sggCode],
    options: shuffle([target.name, ...wrongs.map((w) => w.name)]),
    explain: `${target.name}은(는) ${SIDO_NAME[target.sido]}에 속한 행정구역입니다.`
  };
}

function makeDongQuestion() {
  const target = dongList[Math.floor(Math.random() * dongList.length)];
  let siblings = (dongsBySgg[target.sgg] || []).filter((d) => d.dongName !== target.dongName);
  let names = [...new Set(siblings.map((d) => d.dongName))];
  let wrongs = shuffle(names).slice(0, 3);
  if (wrongs.length < 3) {
    const extra = shuffle([...new Set(dongList.map((d) => d.dongName))].filter((n) => n !== target.dongName && !wrongs.includes(n))).slice(0, 3 - wrongs.length);
    wrongs = wrongs.concat(extra);
  }
  // 소속 설명: 시·구가 다르면 둘 다, 같으면 시만
  const si = siNameOf(target.sggnm);
  const belong = (target.sggnm === si)
    ? `${SIDO_NAME[target.sido]} ${si}`
    : `${SIDO_NAME[target.sido]} ${si} ${target.sggnm.replace(si, "")}`;
  return {
    type:"dong", dong: target, answerLabel: target.dongName, feats:[target.feature],
    options: shuffle([target.dongName, ...wrongs]),
    explain: `${target.dongName}은(는) ${belong}에 속합니다.`
  };
}

function loadQuestion() {
  answered = false;
  const q = quizSet[currentIndex];
  document.getElementById("q-counter").textContent = (currentIndex + 1) + " / 10";
  document.getElementById("score-label").textContent = "점수 " + score;
  document.getElementById("progress-fill").style.width = (currentIndex / 10 * 100) + "%";

  const badge = document.getElementById("q-badge");
  const legend = document.getElementById("legend");
  if (q.type === "dong") {
    badge.className = "badge dong"; badge.textContent = "읍·면·동";
    document.getElementById("question").textContent = "빨간 점이 찍힌 이 읍·면·동의 이름은? (연주황=시, 진주황=구)";
    legend.classList.remove("hidden");
  } else {
    badge.className = "badge gu"; badge.textContent = "구·시·군";
    document.getElementById("question").textContent = "주황색으로 표시된 이 행정구역의 이름은?";
    legend.classList.add("hidden");
  }

  const explainEl = document.getElementById("explain");
  explainEl.classList.add("hidden"); explainEl.textContent = "";

  const optionsEl = document.getElementById("options");
  optionsEl.innerHTML = "";
  q.options.forEach((optLabel) => {
    const btn = document.createElement("button");
    btn.className = "option-btn";
    btn.textContent = optLabel;
    btn.addEventListener("click", () => selectAnswer(btn, optLabel, q));
    optionsEl.appendChild(btn);
  });

  const nextBtn = document.getElementById("next-btn");
  nextBtn.disabled = true;
  nextBtn.textContent = currentIndex === 9 ? "결과지 보기" : "다음 문제";

  if (q.type === "dong") highlightDong(q.dong); else highlightGu(q.feats);
}

function selectAnswer(btn, optLabel, q) {
  if (answered) return;
  answered = true;
  const buttons = document.querySelectorAll(".option-btn");
  buttons.forEach((b) => (b.disabled = true));

  const isCorrect = optLabel === q.answerLabel;
  if (isCorrect) { btn.classList.add("correct"); score += 10; }
  else { btn.classList.add("wrong"); buttons.forEach((b) => { if (b.textContent === q.answerLabel) b.classList.add("correct"); }); }

  // 해설 한 줄 (맞아도/틀려도 표시)
  const explainEl = document.getElementById("explain");
  explainEl.textContent = (isCorrect ? "✅ 정답! " : "❌ 오답. ") + q.explain;
  explainEl.style.borderLeftColor = isCorrect ? "#22c55e" : "#ef4444";
  explainEl.classList.remove("hidden");

  // 결과지 기록
  answerLog.push({
    type: q.type, answer: q.answerLabel, picked: optLabel, correct: isCorrect, explain: q.explain
  });

  document.getElementById("score-label").textContent = "점수 " + score;
  document.getElementById("next-btn").disabled = false;
}

function nextQuestion() {
  currentIndex++;
  if (currentIndex >= 10) showResult();
  else loadQuestion();
}

function showResult() {
  clearHighlight();
  document.getElementById("quiz-screen").classList.add("hidden");
  document.getElementById("result-screen").classList.remove("hidden");
  document.getElementById("final-score").textContent = score;
  const correctCnt = answerLog.filter((a) => a.correct).length;
  const msg = score >= 90 ? "🏆 수도권 지리 마스터!" : score >= 70 ? "👍 훌륭해요!" : score >= 50 ? "🙂 절반은 넘겼어요." : "📚 조금 더 연습해봐요!";
  document.getElementById("result-msg").textContent = `${msg}  (10문제 중 ${correctCnt}개 정답)`;

  // 결과지 렌더
  const report = document.getElementById("report");
  report.innerHTML = "";
  answerLog.forEach((a, i) => {
    const item = document.createElement("div");
    item.className = "report-item " + (a.correct ? "ok" : "no");
    const tag = a.type === "dong" ? "읍·면·동" : "구·시·군";
    const pickedLine = a.correct ? "" : `<div class="sub">내 답: ${a.picked}</div>`;
    item.innerHTML = `
      <div class="head">${i + 1}. ${a.correct ? "⭕" : "❌"} [${tag}] 정답: ${a.answer}</div>
      ${pickedLine}
      <div class="sub">${a.explain}</div>`;
    report.appendChild(item);
  });
}

   부팅
=========================================================== */
window.addEventListener("load", async () => {
  if (typeof naver === "undefined" || !naver.maps) {
    document.getElementById("loading-text").textContent = "네이버 지도 인증 실패.";
    return;
  }
  try {
    initMap();
    await loadAllGeoData();
    document.getElementById("loading").classList.add("hidden");
    const missing = DB.filter((d) => !d.sggCode).map((d) => d.name);
    if (missing.length) document.getElementById("diag").textContent = "⚠ 구 매칭 실패: " + missing.join(", ");
  } catch (e) {
    console.error(e);
    document.getElementById("loading-text").textContent = "데이터 로딩 실패: " + e.message;
    return;
  }
  document.getElementById("start-btn").addEventListener("click", startGame);
  document.getElementById("restart-btn").addEventListener("click", startGame);
  document.getElementById("next-btn").addEventListener("click", nextQuestion);
  document.getElementById("verify-btn").addEventListener("click", verifyAll);
});
