        #score-board { font-size: 1.1rem; font-weight: 700; color: #f1f5f9; background-color: #1e293b; padding: 8px 18px; border-radius: 20px; border: 1px solid #475569; }
        #main-content { flex: 1; display: flex; overflow: hidden; width: 100%; }
        #map-container { flex: 1.4; height: 100%; background-color: #111827; position: relative; }
        #loading-overlay { position: absolute; inset: 0; background-color: rgba(15,23,42,0.92); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 50; color: #cbd5e1; font-weight: 600; gap: 16px; }

        #quiz-panel { flex: 0.9; height: 100%; display: flex; flex-direction: column; border-left: 1px solid #334155; background-color: #1e293b; z-index: 5; }
        #progress-bar-container { width: 100%; height: 6px; background-color: #334155; }

        .option-btn.selected { background-color: #1e3a8a; border-color: #3b82f6; color: #ffffff; box-shadow: 0 0 12px rgba(59,130,246,0.4); }

    let map = null;
    let currentQuizPool = [];
    let currentQuestionIndex = 0;
    let score = 0;
    let selectedOption = null;
    let geojsonLayer = null;
    let centerMarker = null;

    // sgg 코드 -> 해당 코드에 속한 동(洞) feature 배열
    let featuresBySgg = {};

    function initMap() {
        const mapOptions = {
            center: new naver.maps.LatLng(37.5642, 127.0016),
            zoom: 10,
            zoomControl: true,
            zoomControlOptions: { position: naver.maps.Position.RIGHT_CENTER },
            mapTypeControl: false
        };
        map = new naver.maps.Map('map-container', mapOptions);

        // 라벨 없는 백지도: 공식 API의 static 팩토리(getVectorMap)로 배경 전용 지도 유형 등록.
        try {
            const blankTypes = new naver.maps.MapTypeRegistry({
                'blank_no_labels': naver.maps.NaverStyleMapTypeOptions.getVectorMap()
            });
            map.mapTypes = blankTypes;
            map.setMapTypeId('blank_no_labels');
        } catch (e) {
            console.warn("벡터 백지도 적용 실패, 기본 지도로 진행합니다.", e);
        }

        loadAllGeoData();
    }

    // 세 개 광역시도 파일을 모두 받아 sgg 코드별로 인덱싱
    function loadAllGeoData() {
        const urls = Object.values(GEOJSON_FILES);
        Promise.all(urls.map(u => fetch(u).then(r => {
            if (!r.ok) throw new Error("패치 실패: " + u);
            return r.json();
        })))
        .then(datasets => {
            datasets.forEach(ds => {
                ds.features.forEach(f => {
                    const code = f.properties && f.properties.sgg ? String(f.properties.sgg) : "";
                    if (!code) return;
                    if (!featuresBySgg[code]) featuresBySgg[code] = [];
                    featuresBySgg[code].push(f);
                });
            });
            document.getElementById('loading-overlay').style.display = 'none';
            startGame();
        })
        .catch(err => {
            console.error("GeoJSON 로드 에러", err);
            document.getElementById('loading-text').textContent = "데이터를 불러오지 못했습니다. 새로고침 해주세요.";
        });
    }

    function startGame() {
        score = 0;
        currentQuestionIndex = 0;
        document.getElementById('current-score').textContent = "0";
        document.getElementById('result-overlay').style.display = 'none';

        const shuffled = [...metropolitanDatabase].sort(() => 0.5 - Math.random());
        const finalTen = shuffled.slice(0, 10);
        currentQuizPool = finalTen.map(target => buildMatchingQuestion(target));
        loadQuestion(0);
    }

    // 그룹 고립형 오답 생성
    function buildMatchingQuestion(target) {
        let pool = [];
        if (target.group === "gyeonggi_si") {
            pool = metropolitanDatabase.filter(d => d.group === "gyeonggi_si" && d.name !== target.name);
        } else {
            pool = metropolitanDatabase.filter(d => d.cityGroup === target.cityGroup && d.name !== target.name);
            if (pool.length < 3) {
                const fallback = metropolitanDatabase.filter(d =>
                    d.group === target.group && d.cityGroup !== target.cityGroup && d.name !== target.name);
                pool = [...pool, ...fallback];
            }
        }
        const wrong = pool.sort(() => 0.5 - Math.random()).slice(0, 3);
        const options = [target.name, ...wrong.map(d => d.name)].sort(() => 0.5 - Math.random());
        return {
            correctAnswer: target.name,
            options: options,
            sggCode: target.sggCode,
            cityGroup: target.cityGroup,
            group: target.group,
            lat: target.lat,
            lng: target.lng
        };
    }

    function loadQuestion(index) {
        selectedOption = null;
        const submitBtn = document.getElementById('submit-btn');
        submitBtn.disabled = true;
        submitBtn.textContent = "정답 제출하기";
        submitBtn.onclick = handleSubmit;        // 항상 채점 핸들러로 초기화 (재귀 버그 제거)
        document.getElementById('feedback-message').textContent = "";

        document.getElementById('progress-bar').style.width = ((index / 10) * 100) + "%";
        document.getElementById('current-q-num').textContent = index + 1;

        const q = currentQuizPool[index];

        let categoryName = "";
        if (q.group === "seoul") categoryName = "서울특별시 자치구";
        else if (q.group === "incheon") categoryName = "인천광역시 군·구";
        else if (q.group === "gyeonggi_gu") categoryName = `${q.cityGroup}의 행정구`;
        else categoryName = "경기도의 시·군";

        document.getElementById('question-text').innerHTML =
            `지도에 하이라이트된 주황색 영역과 빨간 점이 가리키는 <strong style="color:#3b82f6;">"${categoryName}"</strong>는 어디일까요?`;

        const oc = document.getElementById('options-container');
        oc.innerHTML = '';
        q.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.textContent = opt;
            btn.onclick = () => selectOption(btn, opt);
            oc.appendChild(btn);
        });

        renderMapHighlight(q);
    }

    function selectOption(btn, val) {
        document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedOption = val;
        document.getElementById('submit-btn').disabled = false;
    }

    function handleSubmit() {
        if (selectedOption === null) return;
        const q = currentQuizPool[currentQuestionIndex];
        const buttons = document.querySelectorAll('.option-btn');
        const feedback = document.getElementById('feedback-message');

        buttons.forEach(btn => {
            btn.disabled = true;
            const v = btn.textContent;
            if (v === q.correctAnswer) {
                btn.style.borderColor = "#22c55e"; btn.style.backgroundColor = "#064e3b"; btn.style.color = "#a7f3d0";
            }
            if (selectedOption === v && v !== q.correctAnswer) {
                btn.style.borderColor = "#ef4444"; btn.style.backgroundColor = "#7f1d1d"; btn.style.color = "#fecaca";
            }
        });

        if (selectedOption === q.correctAnswer) {
            score += 10;
            feedback.innerHTML = "정답입니다! 🎉 (+10점)";
            feedback.style.color = "#4ade80";
        } else {
            feedback.innerHTML = `아쉽습니다. 오답입니다. (정답: <strong>${q.correctAnswer}</strong>)`;
            feedback.style.color = "#f87171";
        }
        document.getElementById('current-score').textContent = score;

        const submitBtn = document.getElementById('submit-btn');
        if (currentQuestionIndex < 9) {
            submitBtn.textContent = "다음 문제 풀기 ➔";
            submitBtn.onclick = () => { currentQuestionIndex++; loadQuestion(currentQuestionIndex); };
        } else {
            document.getElementById('progress-bar').style.width = "100%";
            submitBtn.textContent = "최종 결과 확인하기";
            submitBtn.onclick = showFinalResults;
        }
    }

    function renderMapHighlight(q) {
        if (geojsonLayer) { geojsonLayer.setMap(null); geojsonLayer = null; }
        if (centerMarker) { centerMarker.setMap(null); centerMarker = null; }

        const targetLatLng = new naver.maps.LatLng(q.lat, q.lng);

        centerMarker = new naver.maps.Marker({
            position: targetLatLng,
            map: map,
            icon: {
                content: '<div style="width:20px;height:20px;background-color:#ef4444;border:4px solid #fff;border-radius:50%;box-shadow:0 0 10px rgba(239,68,68,0.8);"></div>',
                anchor: new naver.maps.Point(10, 10)
            }
        });

        const optimalZoom = (q.group === "seoul") ? 12 : (q.group === "incheon") ? 11 : 11;
        map.morph(targetLatLng, optimalZoom, { duration: 350, easing: 'easeOutCubic' });

        // ★ sgg 코드로 정확히 해당 행정구/시군구의 동들만 추출해 하이라이트
        const features = featuresBySgg[q.sggCode];
        if (!features || features.length === 0) {
            console.warn("해당 sgg 코드의 경계를 찾지 못했습니다:", q.sggCode, q.correctAnswer);
            return;
        }

        geojsonLayer = new naver.maps.Data();
        geojsonLayer.addGeoJson({ type: "FeatureCollection", features: features });
        geojsonLayer.setStyle({
            fillColor: '#f97316',
            fillOpacity: 0.5,
            strokeColor: '#ea580c',
            strokeWeight: 1.2,
            strokeOpacity: 0.9
        });
        geojsonLayer.setMap(map);
    }

    function showFinalResults() {
        document.getElementById('final-score').textContent = score;
        const ev = document.getElementById('result-evaluation');
        if (score === 100) ev.innerHTML = "🏆 퍼펙트! 수도권의 지배자!<br>시·군·구 유형을 넘나드는 100% 무작위 구성을 완전히 정복하셨습니다!";
        else if (score >= 80) ev.innerHTML = "👍 대단히 훌륭합니다!<br>서울, 인천, 경기 전역을 고르게 파악하는 지리 능력자시군요.";
        else if (score >= 50) ev.innerHTML = "😊 준수한 지리 감각!<br>동일 그룹 기반의 정밀한 오답 선택지들을 잘 구별해 내셨습니다.";
        else ev.innerHTML = "✏️ 아쉽지만 포기하지 마세요!<br>수도권 지역들을 눈에 익히면 금방 실력이 성장합니다.";
        document.getElementById('result-overlay').style.display = 'flex';
    }

    function restartGame() { startGame(); }

    window.onload = initMap;
</script>
</body>
</html>
