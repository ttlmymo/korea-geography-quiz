<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>수도권 지리 마스터 퀴즈</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif; }
  #app { display: flex; width: 100vw; height: 100vh; }
  #map-container { flex: 1; height: 100%; background: #e8eef3; }
  #panel { width: 380px; height: 100%; background: #1e293b; color: #f1f5f9; display: flex; flex-direction: column; padding: 24px; gap: 16px; overflow-y: auto; }
  #panel h1 { font-size: 20px; font-weight: 800; }
  .row { display: flex; justify-content: space-between; align-items: center; font-size: 14px; color: #94a3b8; }
  #progress-bar { height: 6px; background: #334155; border-radius: 3px; overflow: hidden; }
  #progress-fill { height: 100%; width: 0%; background: #f97316; transition: width .3s; }
  #question { font-size: 17px; line-height: 1.5; min-height: 70px; background: #0f172a; padding: 16px; border-radius: 12px; }
  #options { display: flex; flex-direction: column; gap: 10px; }
  .option-btn { text-align: left; padding: 14px 16px; border: 2px solid #334155; background: #0f172a; color: #f1f5f9; border-radius: 12px; font-size: 15px; cursor: pointer; transition: all .15s; }
  .option-btn:hover:not(:disabled) { border-color: #f97316; }
  .option-btn:disabled { cursor: default; }
  .option-btn.correct { border-color: #22c55e; background: #14532d; }
  .option-btn.wrong { border-color: #ef4444; background: #450a0a; }
  #next-btn, #start-btn, #restart-btn { padding: 14px; background: #f97316; color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; }
  #next-btn:disabled { background: #475569; cursor: default; }
  #result { text-align: center; display: flex; flex-direction: column; gap: 16px; }
  #result .score { font-size: 48px; font-weight: 900; color: #f97316; }
  #loading { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(15,23,42,.85); color: #fff; font-size: 18px; z-index: 50; }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div id="app">
  <div id="map-container"></div>
  <div id="panel">
    <h1>🗺️ 수도권 지리 마스터</h1>

    <div id="start-screen">
      <p style="color:#94a3b8; line-height:1.6; margin-bottom:16px;">
        백지도에 표시된 행정구역(주황색)이 어디인지 4지선다로 맞혀보세요. 매 게임 10문제가 무작위로 출제됩니다.
      </p>
      <button id="start-btn">게임 시작</button>
    </div>

    <div id="quiz-screen" class="hidden">
      <div class="row">
        <span id="q-counter">1 / 10</span>
        <span id="score-label">점수 0</span>
      </div>
      <div id="progress-bar"><div id="progress-fill"></div></div>
      <div id="question"></div>
      <div id="options"></div>
      <button id="next-btn" disabled>다음 문제</button>
    </div>

    <div id="result-screen" class="hidden">
      <div id="result">
        <div>최종 점수</div>
        <div class="score"><span id="final-score">0</span> / 100</div>
        <div id="final-msg"></div>
        <button id="restart-btn">다시 하기</button>
      </div>
    </div>
  </div>
</div>

<div id="loading">지도 및 경계 데이터를 불러오는 중…</div>

<script src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=kizfnbhv3q&submodules=geocoder"></script>

  {name:"양주시", matchName:"양주시", group:"gg-city"},
  {name:"포천시", matchName:"포천시", group:"gg-city"},
  {name:"여주시", matchName:"여주시", group:"gg-city"},
  {name:"의정부시", matchName:"의정부시", group:"gg-city"},
  {name:"연천군", matchName:"연천군", group:"gg-city"},
  {name:"가평군", matchName:"가평군", group:"gg-city"},

/* ===========================================================
   전역 상태
=========================================================== */
let map = null;
let centerMarker = null;
let highlightedFeatures = [];          // 현재 칠해진 data feature 목록
const featuresBySgg = {};              // sgg코드 -> [feature,...]
const codeByMatch = {};                // "sido|matchName" -> sgg코드 (자동추출)

let quizSet = [];
let currentIndex = 0;
let score = 0;
let answered = false;

/* ===========================================================
   초기화
=========================================================== */
function initMap() {
  map = new naver.maps.Map("map-container", {
    center: new naver.maps.LatLng(37.5642, 127.0016),
    zoom: 10,
    minZoom: 8,
    maxZoom: 14,
    // 라벨(lko)을 뺀 백지도. NaverStyleMapTypeOptions 는 정적 메서드로 호출한다.
    mapTypes: new naver.maps.MapTypeRegistry({
      "normal_no_labels": naver.maps.NaverStyleMapTypeOptions.getNormalMap({
        overlayType: "bg.ol"
      })
    }),
    mapTypeId: "normal_no_labels",
    scaleControl: false,
    logoControl: true,
    mapDataControl: false,
    zoomControl: false
  });
}

/* 전 파일 로드 → data 레이어에 추가 → 인덱스 구축 */
async function loadAllGeoData() {
  // 모든 feature 를 숨김 스타일로 깔아두고, 하이라이트 시 overrideStyle 로 칠한다.
  map.data.setStyle(() => ({
    fillOpacity: 0,
    strokeWeight: 0,
    clickable: false
  }));

  for (const url of GEOJSON_FILES) {
    const res = await fetch(url);
    if (!res.ok) throw new Error("GeoJSON 로드 실패: " + url);
    const geojson = await res.json();
    map.data.addGeoJson(geojson);
  }

  // 인덱스 구축: sgg코드별 feature 모으기 + matchName→코드 자동추출
  map.data.forEach((feature) => {
    const sgg = feature.getProperty("sgg");
    const sggnm = feature.getProperty("sggnm");
    const sido = feature.getProperty("sido");
    if (!sgg) return;

    if (!featuresBySgg[sgg]) featuresBySgg[sgg] = [];
    featuresBySgg[sgg].push(feature);

    if (sggnm) {
      codeByMatch[sido + "|" + sggnm] = sgg;   // 시도 구분 키 (동명이구 대응)
      if (!(sggnm in codeByMatch)) codeByMatch[sggnm] = sgg; // 보조 키
    }
  });

  // DB 각 항목에 실제 sgg코드 부여 (자동추출 결과)
  DB.forEach((item) => {
    const keyed = (item.sido ? item.sido + "|" : "") + item.matchName;
    item.sggCode = codeByMatch[keyed] || codeByMatch[item.matchName] || null;
  });
}

/* ===========================================================
   하이라이트
=========================================================== */
function clearHighlight() {
  highlightedFeatures.forEach((f) => map.data.revertStyle(f));
  highlightedFeatures = [];
  if (centerMarker) { centerMarker.setMap(null); centerMarker = null; }
}

function renderMapHighlight(item) {
  clearHighlight();
  const feats = item.sggCode ? featuresBySgg[item.sggCode] : null;
  if (!feats || feats.length === 0) {
    console.warn("해당 sgg 코드의 경계를 찾지 못했습니다:", item.sggCode, item.name);
    return;
  }

  // 칠하기 + 경계 계산
  const bounds = new naver.maps.LatLngBounds();
  feats.forEach((f) => {
    map.data.overrideStyle(f, {
      fillColor: "#f97316",
      fillOpacity: 0.55,
      strokeColor: "#ea580c",
      strokeWeight: 2,
      strokeOpacity: 0.95
    });
    highlightedFeatures.push(f);

    // bounds 누적
    const geo = f.getGeometry ? null : null; // data API는 직접 좌표 접근이 제한적이라 아래 방식 사용
  });

  // 중심으로 부드럽게 이동 (bounds 기반)
  fitToFeatures(feats);
}

/* feature 들의 좌표를 모아 bounds 계산 후 morph */
function fitToFeatures(feats) {
  const bounds = new naver.maps.LatLngBounds();
  let has = false;
  feats.forEach((f) => {
    const json = f.toGeoJson ? f.toGeoJson() : null;
    if (!json || !json.geometry) return;
    collectCoords(json.geometry, (lng, lat) => {
      bounds.extend(new naver.maps.LatLng(lat, lng));
      has = true;
    });
  });
  if (!has) return;

  const center = bounds.getCenter();
  map.morph(center, optimalZoom(feats), { duration: 500, easing: "easeOutCubic" });

  centerMarker = new naver.maps.Marker({
    position: center,
    map: map,
    icon: {
      content: '<div style="width:14px;height:14px;background:#ef4444;border:2px solid #fff;border-radius:50%;box-shadow:0 0 6px rgba(0,0,0,.5);"></div>',
      anchor: new naver.maps.Point(7, 7)
    }
  });
}

function collectCoords(geometry, cb) {
  const t = geometry.type;
  const c = geometry.coordinates;
  const walk = (arr, depth) => {
    if (depth === 0) { cb(arr[0], arr[1]); return; }
    arr.forEach((a) => walk(a, depth - 1));
  };
  if (t === "Polygon") walk(c, 2);
  else if (t === "MultiPolygon") walk(c, 3);
}

function optimalZoom(feats) {
  // feature 개수(=동 수)가 많을수록 면적이 크다고 가정해 줌 조정
  const n = feats.length;
  if (n >= 15) return 11;
  if (n >= 6) return 12;
  return 13;
}

/* ===========================================================
   퀴즈 로직
=========================================================== */
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startGame() {
  // sggCode 가 실제로 잡힌 항목만 출제 대상으로 (데이터에 없는 건 제외)
  const valid = DB.filter((d) => d.sggCode);
  quizSet = shuffle(valid).slice(0, 10);
  currentIndex = 0;
  score = 0;
  document.getElementById("start-screen").classList.add("hidden");
  document.getElementById("result-screen").classList.add("hidden");
  document.getElementById("quiz-screen").classList.remove("hidden");
  loadQuestion();
}

function buildOptions(target) {
  // 같은 group 에서만 오답 3개 추출
  const pool = quizSet[0] ? DB.filter(d => d.group === target.group && d.matchName !== target.matchName && d.sggCode) : [];
  const wrongs = shuffle(pool).slice(0, 3);
  // 같은 그룹에 보기가 부족하면 다른 그룹에서 보충 (안전장치)
  if (wrongs.length < 3) {
    const extra = shuffle(DB.filter(d => d.sggCode && d.matchName !== target.matchName && !wrongs.includes(d)))
                  .slice(0, 3 - wrongs.length);
    wrongs.push(...extra);
  }
  return shuffle([target, ...wrongs]);
}

function loadQuestion() {
  answered = false;
  const target = quizSet[currentIndex];

  document.getElementById("q-counter").textContent = (currentIndex + 1) + " / 10";
  document.getElementById("score-label").textContent = "점수 " + score;
  document.getElementById("progress-fill").style.width = (currentIndex / 10 * 100) + "%";
  document.getElementById("question").textContent = "주황색으로 표시된 이 행정구역의 이름은?";

  const optionsEl = document.getElementById("options");
  optionsEl.innerHTML = "";
  const options = buildOptions(target);
  options.forEach((opt) => {
    const btn = document.createElement("button");
    btn.className = "option-btn";
    btn.textContent = opt.name;
    btn.addEventListener("click", () => selectAnswer(btn, opt, target, options));
    optionsEl.appendChild(btn);
  });

  const nextBtn = document.getElementById("next-btn");
  nextBtn.disabled = true;
  nextBtn.textContent = currentIndex === 9 ? "결과 보기" : "다음 문제";

  renderMapHighlight(target);
}

function selectAnswer(btn, opt, target, options) {
  if (answered) return;          // 즉시채점 + 중복클릭 방지 (무한재귀 버그 제거)
  answered = true;

  const buttons = document.querySelectorAll(".option-btn");
  buttons.forEach((b) => (b.disabled = true));

  if (opt.matchName === target.matchName && opt.group === target.group) {
    btn.classList.add("correct");
    score += 10;
  } else {
    btn.classList.add("wrong");
    // 정답 버튼 강조
    buttons.forEach((b) => {
      if (b.textContent === target.name) b.classList.add("correct");
    });
  }

  document.getElementById("score-label").textContent = "점수 " + score;
  document.getElementById("next-btn").disabled = false;
}

function nextQuestion() {
  currentIndex++;
  if (currentIndex >= 10) {
    showResult();
  } else {
    loadQuestion();
  }
}

function showResult() {
  clearHighlight();
  document.getElementById("quiz-screen").classList.add("hidden");
  document.getElementById("result-screen").classList.remove("hidden");
  document.getElementById("final-score").textContent = score;
  const msg = score >= 90 ? "🏆 수도권 지리 마스터!" :
              score >= 70 ? "👍 훌륭해요!" :
              score >= 50 ? "🙂 절반은 넘겼어요." :
                            "📚 조금 더 연습해봐요!";
  document.getElementById("final-msg").textContent = msg;
}

/* ===========================================================

window.addEventListener("load", async () => {
  if (typeof naver === "undefined" || !naver.maps) {
    document.getElementById("loading").textContent =
      "네이버 지도 인증 실패. ttlmymo.github.io 도메인 등록과 키를 확인하세요.";
    return;
  }
  try {
    initMap();
    await loadAllGeoData();
    document.getElementById("loading").classList.add("hidden");

    const missing = DB.filter(d => !d.sggCode).map(d => d.name);
    if (missing.length) {
      console.warn("sgg 코드를 못 찾은 항목 (출제 제외):", missing);
    }
  } catch (e) {
    console.error(e);
    document.getElementById("loading").textContent = "데이터 로딩 실패: " + e.message;
    return;
  }

  document.getElementById("start-btn").addEventListener("click", startGame);
  document.getElementById("restart-btn").addEventListener("click", startGame);
  document.getElementById("next-btn").addEventListener("click", nextQuestion);
});
</script>
