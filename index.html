        }

            justify-content: space-between;
            overflow-y: auto;
        }

            font-weight: 700;
            margin-bottom: 12px;

            margin-bottom: 20px;
            font-weight: 600;
            color: #f1f5f9;
        }
        #options-container {

            grid-template-columns: 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        .option-btn {
            background-color: #334155;
            color: #e2e8f0;
            border: 2px solid #475569;
            padding: 14px 20px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 500;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .option-btn:hover:not(:disabled) {
            background-color: #475569;
            border-color: #38bdf8;
            transform: translateY(-1px);
        }
        .option-btn.selected {
            background-color: #1e3a8a;
            border-color: #3b82f6;
            color: #ffffff;
            box-shadow: 0 0 12px rgba(59, 130, 246, 0.3);

            font-size: 1.05rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            margin-bottom: 16px;

            width: 100%;
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            color: #ffffff;
            border: none;
            padding: 16px;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.2);
        }
        #submit-btn:hover:not(:disabled) {
            filter: brightness(1.1);
            transform: translateY(-1px);
        }
        #submit-btn:disabled {
            background: #475569;
            color: #94a3b8;
            cursor: not-allowed;
            box-shadow: none;
        }
        #result-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(15, 23, 42, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
            display: none;

            border: 1px solid #334155;
            padding: 40px;
            border-radius: 16px;
            text-align: center;

</head>

    function initMap() {
        const mapOptions = {
            center: new naver.maps.LatLng(37.5642, 127.0016),
            zoom: 10,
            zoomControl: true,
            zoomControlOptions: {
                position: naver.maps.Position.RIGHT_CENTER
            },
            mapTypeControl: false,
            mapTypeId: naver.maps.MapTypeId.NORMAL
        };

        map = new naver.maps.Map('map-container', mapOptions);

        fetch(NATION_GEOJSON_URL)
            .then(res => {
                if(!res.ok) throw new Error("데이터 수집 불안정");
                return res.json();
            })
            .then(data => {
                geoJsonData = data;
                startGame();
            })
            .catch(err => {
                console.error("지오메트리 로드 실패", err);

            });
    }

    // --- ★ 완전 랜덤 게임 시작 (인위적인 유형별 비중 제약 완전히 삭제) ---
    function startGame() {
        score = 0;
        currentQuestionIndex = 0;
        document.getElementById('current-score').textContent = "0";
        document.getElementById('result-overlay').style.display = 'none';

        // 78개 전체 데이터베이스를 복사하여 완전 무작위 셔플 후, 순수한 10문제만 골라냅니다.
        const completelyShuffled = [...metropolitanDatabase].sort(() => 0.5 - Math.random());
        const finalTen = completelyShuffled.slice(0, 10);

        // 4지선다 보기 구성 빌드
        currentQuizPool = finalTen.map(target => {
            return buildMatchingQuestion(target);
        });

        loadQuestion(0);
    }

    // --- 동일 성격 그룹 기반 보기 구성 매칭 엔진 ---
    function buildMatchingQuestion(target) {
        let sameTypePool = [];

        if (target.group === "gyeonggi_si") {
            // 경기도 일반 시·군 문제인 경우, 오답도 구 단위가 완전히 배제된 "경기도 일반 시·군" 풀에서만 무작위 출제
            sameTypePool = metropolitanDatabase.filter(d => d.group === "gyeonggi_si" && d.name !== target.name);
        } else {
            // 구를 묻는 문제인 경우 (서울의 구, 인천의 구, 경기도 시 내부의 행정구 등)
            // 1순위: 동일 행정구역(시) 내부 (수원시 내부, 성남시 내부, 서울특별시 내부 등)
            sameTypePool = metropolitanDatabase.filter(d => d.cityGroup === target.cityGroup && d.name !== target.name);

            // 해당 그룹의 후보가 부족한 경우에 한해 동일 성격의 다른 일반 '구' 그룹에서 충당
            if (sameTypePool.length < 3) {
                const fallbackPool = metropolitanDatabase.filter(d => 
                    d.group === target.group && 
                    d.cityGroup !== target.cityGroup && 
                    d.name !== target.name
                );
                sameTypePool = [...sameTypePool, ...fallbackPool];
            }
        }

        // 오답 3개 획득 및 4지선다 무작위 뒤섞기
        const wrongDistricts = sameTypePool.sort(() => 0.5 - Math.random()).slice(0, 3);
        const options = [target.name, ...wrongDistricts.map(d => d.name)].sort(() => 0.5 - Math.random());

        return {
            type: "single",
            correctAnswer: target.name,
            options: options,
            districtType: target.type,
            cityGroup: target.cityGroup,
            group: target.group,
            lat: target.lat,
            lng: target.lng
        };
    }

    // --- 문제 로드 및 UI 배치 ---
    function loadQuestion(index) {
        selectedOption = null;
        document.getElementById('submit-btn').disabled = true;
        document.getElementById('submit-btn').textContent = "선택 즉시 정답 확인";
        document.getElementById('feedback-message').textContent = "";

        const progressPercent = (index / 10) * 100;
        document.getElementById('progress-bar').style.width = progressPercent + "%";
        document.getElementById('current-q-num').textContent = index + 1;

        const q = currentQuizPool[index];

        const typeBadge = document.getElementById('quiz-type-badge');
        const qText = document.getElementById('question-text');
        
        typeBadge.textContent = "단일선택";
        typeBadge.style.backgroundColor = "#eff6ff";
        typeBadge.style.color = "#1d4ed8";
        
        // 정답 지역의 성격에 어울리는 자연스러운 지시 문구 유동화
        let categoryName = "";
        if (q.group === "seoul") {
            categoryName = "서울특별시 자치구";
        } else if (q.group === "incheon") {
            categoryName = "인천광역시 군·구";
        } else if (q.group === "gyeonggi_gu") {
            categoryName = `${q.cityGroup}의 행정구`;
        } else {
            categoryName = "경기도의 시·군";
        }

        qText.innerHTML = `지도에 하이라이트된 주황색 영역과 빨간 점이 가리키는 <strong style="color: #3b82f6;">"${categoryName}"</strong>는 어디일까요?`;

        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = '';

        q.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.textContent = opt;
            btn.onclick = () => selectOption(btn, opt);
            optionsContainer.appendChild(btn);
        });

        // 줌 및 중심 락(Lock) 카메라 무빙, 주황 하이라이트 경계 렌더링
        renderMapHighlight(q);
    }

    // --- 선택 동작 제어 ---
    function selectOption(btn, val) {
        document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedOption = val;
        document.getElementById('submit-btn').disabled = false;
    }

    // --- 제출 및 정오답 피드백 흐름 제어 ---
    document.getElementById('submit-btn').onclick = () => {
        const q = currentQuizPool[currentQuestionIndex];
        const buttons = document.querySelectorAll('.option-btn');
        const feedback = document.getElementById('feedback-message');

        buttons.forEach(btn => {
            btn.disabled = true;
            const btnVal = btn.textContent;

            if (btnVal === q.correctAnswer) {
                btn.style.borderColor = "#22c55e";
                btn.style.backgroundColor = "#064e3b";
                btn.style.color = "#a7f3d0";
            }
            if (selectedOption === btnVal && btnVal !== q.correctAnswer) {
                btn.style.borderColor = "#ef4444";
                btn.style.backgroundColor = "#7f1d1d";
                btn.style.color = "#fecaca";
            }
        });

        if (selectedOption === q.correctAnswer) {
            score += 10;
            feedback.innerHTML = "정답입니다! 🎉 (+10점)";
            feedback.style.color = "#4ade80";
        } else {
            feedback.innerHTML = `아쉽습니다. 오답입니다. (정답: <strong>${q.correctAnswer}</strong>)`;
            feedback.style.color = "#f87171";
        }

        document.getElementById('current-score').textContent = score;

        const submitBtn = document.getElementById('submit-btn');
        if (currentQuestionIndex < 9) {
            submitBtn.textContent = "다음 문제 풀기 ➔";
            submitBtn.onclick = () => {
                currentQuestionIndex++;
                loadQuestion(currentQuestionIndex);
                restoreSubmitBtnState();
            };
        } else {
            document.getElementById('progress-bar').style.width = "100%";
            submitBtn.textContent = "최종 결과 확인하기";
            submitBtn.onclick = () => {
                showFinalResults();
            };
        }
    };

    function restoreSubmitBtnState() {
        const btn = document.getElementById('submit-btn');
        btn.textContent = "선택 즉시 정답 확인";
        btn.disabled = true;
        btn.onclick = () => {
            document.getElementById('submit-btn').click();
        };
    }

    // --- 카메라 빨간 점 중심 고정 및 주황 하이라이트 정상화 ---
    function renderMapHighlight(q) {
        if (geojsonLayer) {
            geojsonLayer.setMap(null);
            geojsonLayer = null;
        }
        if (centerMarker) {
            centerMarker.setMap(null);
            centerMarker = null;
        }

        const targetLatLng = new naver.maps.LatLng(q.lat, q.lng);

        // 1. 빨간색 마커 생성
        centerMarker = new naver.maps.Marker({
            position: targetLatLng,
            map: map,
            icon: {
                content: '<div style="width: 20px; height: 20px; background-color: #ef4444; border: 4px solid #ffffff; border-radius: 50%; box-shadow: 0 0 10px rgba(239, 68, 68, 0.8);"></div>',
                anchor: new naver.maps.Point(10, 10)
            }
        });

        // 2. 화면 초점을 마커 중앙에 완벽히 동기화
        const optimalZoom = (q.group === "seoul") ? 12 : (q.group === "incheon") ? 11 : 10;
        map.morph(targetLatLng, optimalZoom, {
            duration: 350,
            easing: 'easeOutCubic'
        });

        // 3. KOSTAT 한글 무결 데이터와 정확한 매칭을 거쳐 주황색 하이라이트 복원
        if (!geoJsonData) return;

        const matchedFeatures = geoJsonData.features.filter(feature => {
            const rawGeoName = feature.properties.name || feature.properties.name_kor || feature.properties.SIG_KOR_NM || "";
            if (!rawGeoName) return false;

            const cleanGeoName = rawGeoName.replace(/[\s-]/g, "");
            const cleanQuizName = q.correctAnswer.replace(/[\s-]/g, "");

            return (cleanGeoName.includes(cleanQuizName) || cleanQuizName.includes(cleanGeoName));
        });

        if (matchedFeatures.length > 0) {
            const finalGeoJson = {
                type: "FeatureCollection",
                features: matchedFeatures
            };

            geojsonLayer = new naver.maps.Data();
            geojsonLayer.addGeoJson(finalGeoJson);

            geojsonLayer.setStyle(feature => {
                return {
                    fillColor: '#f97316',
                    fillOpacity: 0.5,
                    strokeColor: '#ea580c',
                    strokeWeight: 4,
                    strokeOpacity: 0.95
                };
            });

            geojsonLayer.setMap(map);
        }
    }

    // --- 최종 성적표 출력 ---
    function showFinalResults() {
        document.getElementById('final-score').textContent = score;
        const evaluation = document.getElementById('result-evaluation');

        if (score === 100) {
            evaluation.innerHTML = "🏆 퍼펙트! 수도권의 지배자!<br>시·군·구 유형을 넘나드는 난이도 높은 100% 무작위 구성을 정복하셨습니다!";
        } else if (score >= 80) {
            evaluation.innerHTML = "👍 대단히 훌륭합니다!<br>서울, 인천, 경기 일반 시·군까지 고르게 분포된 영역을 잘 파악해 내는 지리 능력자시군요.";
        } else if (score >= 50) {
            evaluation.innerHTML = "😊 준수한 지리 감각!<br>동일 그룹에 기반한 정밀한 오답 선택지들을 예리하게 잘 구별해 내셨습니다.";
        } else {
            evaluation.innerHTML = "✏️ 아쉬운 결과지만 포기하지 마세요!<br>다양하게 등장하는 수도권 지역들을 눈에 익히면 금방 실력이 성장합니다.";
        }

        document.getElementById('result-overlay').style.display = 'flex';
    }

    function restartGame() {
        startGame();
    }

    window.onload = initMap;
</script>
