<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>수도권 지리 마스터 퀴즈</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif; }
  #app { display: flex; width: 100vw; height: 100vh; }
  #map-container { flex: 1; height: 100%; background: #e8eef3; }
  #panel { width: 400px; height: 100%; background: #1e293b; color: #f1f5f9; display: flex; flex-direction: column; padding: 24px; gap: 16px; overflow-y: auto; }
  #panel h1 { font-size: 20px; font-weight: 800; }
  .row { display: flex; justify-content: space-between; align-items: center; font-size: 14px; color: #94a3b8; }
  #progress-bar { height: 6px; background: #334155; border-radius: 3px; overflow: hidden; }
  #progress-fill { height: 100%; width: 0%; background: #f97316; transition: width .3s; }
  #question { font-size: 17px; line-height: 1.5; min-height: 60px; background: #0f172a; padding: 16px; border-radius: 12px; }
  #options { display: flex; flex-direction: column; gap: 10px; }
  .option-btn { text-align: left; padding: 14px 16px; border: 2px solid #334155; background: #0f172a; color: #f1f5f9; border-radius: 12px; font-size: 15px; cursor: pointer; transition: all .15s; }
  .option-btn:hover:not(:disabled) { border-color: #f97316; }
  .option-btn:disabled { cursor: default; }
  .option-btn.correct { border-color: #22c55e; background: #14532d; }
  .option-btn.wrong { border-color: #ef4444; background: #450a0a; }
  button.primary { padding: 14px; background: #f97316; color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; }
  button.secondary { padding: 12px; background: #334155; color: #f1f5f9; border: none; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; }
  #next-btn:disabled { background: #475569; cursor: default; }
  #result { text-align: center; display: flex; flex-direction: column; gap: 16px; }
  #result .score { font-size: 48px; font-weight: 900; color: #f97316; }
  #loading { position: absolute; inset: 0; display: flex; flex-direction: column; gap: 12px; align-items: center; justify-content: center; background: rgba(15,23,42,.9); color: #fff; font-size: 18px; z-index: 50; text-align: center; padding: 20px; }
  .spinner { width: 36px; height: 36px; border: 4px solid #334155; border-top-color: #f97316; border-radius: 50%; animation: spin 0.9s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .hidden { display: none !important; }
  #verify-result { margin-top: 8px; font-size: 12px; line-height: 1.6; }
  #diag { font-size: 12px; color: #fca5a5; margin-top: 8px; }
</style>
</head>
<body>
<div id="app">
  <div id="map-container"></div>
  <div id="panel">
    <h1>🗺️ 수도권 지리 마스터</h1>

    <div id="start-screen">
      <p style="color:#94a3b8; line-height:1.6;">
        백지도에 주황색으로 표시된 행정구역이 어디인지 4지선다로 맞혀보세요. 매 게임 10문제가 무작위로 출제됩니다.
      </p>
      <button id="start-btn" class="primary">게임 시작</button>
      <button id="verify-btn" class="secondary" style="margin-top:10px;">🔍 전체 78개 검증</button>
      <div id="diag"></div>
      <div id="verify-result"></div>
    </div>

    <div id="quiz-screen" class="hidden">
      <div class="row">
        <span id="q-counter">1 / 10</span>
        <span id="score-label">점수 0</span>
      </div>
      <div id="progress-bar"><div id="progress-fill"></div></div>
      <div id="question"></div>
      <div id="options"></div>
      <button id="next-btn" class="primary" disabled>다음 문제</button>
    </div>

    <div id="result-screen" class="hidden">

        <div>최종 점수</div>
        <div class="score"><span id="final-score">0</span> / 100</div>
        <div id="final-msg"></div>
        <button id="restart-btn" class="primary">다시 하기</button>
      </div>
    </div>
  </div>
</div>

<div id="loading">

  <div id="loading-text">지도 및 경계 데이터를 불러오는 중…</div>

/* ===========================================================
   전역 상태
=========================================================== */
let map = null;
let centerMarker = null;
let highlightedFeatures = [];
const featuresBySgg = {};       // sgg -> [feature]
const codeByKey = {};           // "sido|sggnm" -> sgg

let quizSet = [];
let currentIndex = 0;
let score = 0;
let answered = false;

/* ===========================================================
   지도 초기화
=========================================================== */
function initMap() {
  map = new naver.maps.Map("map-container", {
    center: new naver.maps.LatLng(37.5642, 127.0016),
    zoom: 10,
    minZoom: 8,
    maxZoom: 14,
    mapTypes: new naver.maps.MapTypeRegistry({
      "normal_no_labels": naver.maps.NaverStyleMapTypeOptions.getNormalMap({
        overlayType: "bg.ol"     // 라벨(lko) 제외 = 백지도
      })
    }),
    mapTypeId: "normal_no_labels",
    scaleControl: false,
    logoControl: true,
    mapDataControl: false,
    zoomControl: false
  });
}

/* ===========================================================
   데이터 로드 (병렬) + 인덱스 구축
=========================================================== */
async function loadAllGeoData() {
  map.data.setStyle(() => ({ fillOpacity: 0, strokeWeight: 0, clickable: false }));

  const geojsons = await Promise.all(
    GEOJSON_FILES.map(async (url) => {
      const res = await fetch(url);
      if (!res.ok) throw new Error("GeoJSON 로드 실패: " + url);
      return res.json();
    })
  );
  geojsons.forEach((g) => map.data.addGeoJson(g));

  map.data.forEach((feature) => {
    const sgg = feature.getProperty("sgg");
    const sggnm = feature.getProperty("sggnm");
    const sido = feature.getProperty("sido");
    if (!sgg) return;
    if (!featuresBySgg[sgg]) featuresBySgg[sgg] = [];
    featuresBySgg[sgg].push(feature);
    if (sggnm && sido) codeByKey[sido + "|" + sggnm] = sgg;
  });

  DB.forEach((item) => {
    item.sggCode = codeByKey[item.sido + "|" + item.matchName] || null;
  });
}

/* ===========================================================
   하이라이트
=========================================================== */
function clearHighlight() {
  highlightedFeatures.forEach((f) => map.data.revertStyle(f));
  highlightedFeatures = [];
  if (centerMarker) { centerMarker.setMap(null); centerMarker = null; }
}

function renderMapHighlight(item) {
  clearHighlight();
  const feats = item.sggCode ? featuresBySgg[item.sggCode] : null;
  if (!feats || feats.length === 0) {
    console.warn("경계를 찾지 못함:", item.name, item.sggCode);
    return;
  }
  const names = new Set(feats.map((f) => f.getProperty("sggnm")));
  console.log("[정답]", item.name, "| sgg:", item.sggCode,
              "| 칠해지는 구:", [...names], "| 동 개수:", feats.length);

  feats.forEach((f) => {
    map.data.overrideStyle(f, {
      fillColor: "#f97316", fillOpacity: 0.55,
      strokeColor: "#ea580c", strokeWeight: 2, strokeOpacity: 0.95
    });
    highlightedFeatures.push(f);
  });
  fitToFeatures(feats);
}

function fitToFeatures(feats) {
  const bounds = new naver.maps.LatLngBounds();
  let has = false;
  feats.forEach((f) => {
    const json = f.toGeoJson ? f.toGeoJson() : null;
    if (!json || !json.geometry) return;
    collectCoords(json.geometry, (lng, lat) => {
      bounds.extend(new naver.maps.LatLng(lat, lng));
      has = true;
    });
  });
  if (!has) return;
  const center = bounds.getCenter();
  map.morph(center, optimalZoom(feats), { duration: 500, easing: "easeOutCubic" });

  centerMarker = new naver.maps.Marker({
    position: center,
    map: map,
    icon: {
      content: '<div style="width:14px;height:14px;background:#ef4444;border:2px solid #fff;border-radius:50%;box-shadow:0 0 6px rgba(0,0,0,.5);"></div>',
      anchor: new naver.maps.Point(7, 7)
    }
  });
}

function collectCoords(geometry, cb) {
  const t = geometry.type, c = geometry.coordinates;
  const walk = (arr, depth) => {
    if (depth === 0) { cb(arr[0], arr[1]); return; }
    arr.forEach((a) => walk(a, depth - 1));
  };
  if (t === "Polygon") walk(c, 2);
  else if (t === "MultiPolygon") walk(c, 3);
}

function optimalZoom(feats) {
  const n = feats.length;
  if (n >= 15) return 11;
  if (n >= 6) return 12;
  return 13;
}

/* ===========================================================
   전체 검증
=========================================================== */
function verifyAll() {
  const out = document.getElementById("verify-result");
  const problems = [];
  let okCount = 0;

  DB.forEach((item) => {
    if (!item.sggCode) {
      problems.push(`❌ [매칭실패] ${item.name} (matchName: "${item.matchName}")`);
      return;
    }
    const feats = featuresBySgg[item.sggCode];
    if (!feats || feats.length === 0) {
      problems.push(`❌ [경계없음] ${item.name} (sgg ${item.sggCode})`);
      return;
    }
    const names = new Set(feats.map((f) => f.getProperty("sggnm")));
    if (names.size !== 1) {
      problems.push(`⚠ [혼합오염] ${item.name} → ${[...names].join(", ")}`);
      return;
    }
    const actual = [...names][0];
    if (actual !== item.matchName) {
      problems.push(`⚠ [이름불일치] ${item.name} → DB:"${item.matchName}" vs 데이터:"${actual}"`);
      return;
    }
    okCount++;
  });

  // 코드 중복 검사
  const codeToItems = {};
  DB.forEach((item) => {
    if (!item.sggCode) return;
    (codeToItems[item.sggCode] = codeToItems[item.sggCode] || []).push(item.name);
  });
  Object.entries(codeToItems).forEach(([code, names]) => {
    if (names.length > 1) problems.push(`⛔ [코드중복] sgg ${code}: ${names.join(", ")}`);
  });

  let html = `<div style="color:#22c55e; font-weight:700;">✅ 정상: ${okCount} / ${DB.length}</div>`;
  if (problems.length === 0) {
    html += `<div style="color:#22c55e; margin-top:6px;">🎉 모든 항목이 정확하게 매칭됩니다!</div>`;
  } else {
    html += `<div style="color:#fca5a5; margin-top:8px; max-height:340px; overflow-y:auto;">`;
    problems.forEach((p) => { html += `<div style="margin-bottom:4px;">${p}</div>`; });
    html += `</div>`;
  }
  out.innerHTML = html;

  console.table(
    DB.map((d) => {
      const feats = d.sggCode ? featuresBySgg[d.sggCode] : null;
      const names = feats ? [...new Set(feats.map((f) => f.getProperty("sggnm")))] : [];
      return {
        표시명: d.name, matchName: d.matchName, sgg코드: d.sggCode || "(없음)",
        칠해지는구: names.join(",") || "(없음)", 동개수: feats ? feats.length : 0,
        정상: d.sggCode && names.length === 1 && names[0] === d.matchName ? "O" : "X"
      };
    })
  );
}

/* ===========================================================
   퀴즈 로직
=========================================================== */
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startGame() {
  const valid = DB.filter((d) => d.sggCode);
  quizSet = shuffle(valid).slice(0, 10);
  currentIndex = 0;
  score = 0;
  document.getElementById("start-screen").classList.add("hidden");
  document.getElementById("result-screen").classList.add("hidden");
  document.getElementById("quiz-screen").classList.remove("hidden");
  loadQuestion();
}

function buildOptions(target) {
  let pool = DB.filter((d) => d.group === target.group && d.matchName !== target.matchName && d.sggCode);
  let wrongs = shuffle(pool).slice(0, 3);
  if (wrongs.length < 3) {
    const extra = shuffle(DB.filter((d) => d.sggCode && d.matchName !== target.matchName && !wrongs.includes(d)))
                  .slice(0, 3 - wrongs.length);
    wrongs = wrongs.concat(extra);
  }
  return shuffle([target, ...wrongs]);
}

function loadQuestion() {
  answered = false;
  const target = quizSet[currentIndex];

  document.getElementById("q-counter").textContent = (currentIndex + 1) + " / 10";
  document.getElementById("score-label").textContent = "점수 " + score;
  document.getElementById("progress-fill").style.width = (currentIndex / 10 * 100) + "%";
  document.getElementById("question").textContent = "주황색으로 표시된 이 행정구역의 이름은?";

  const optionsEl = document.getElementById("options");
  optionsEl.innerHTML = "";
  buildOptions(target).forEach((opt) => {
    const btn = document.createElement("button");
    btn.className = "option-btn";
    btn.textContent = opt.name;
    btn.addEventListener("click", () => selectAnswer(btn, opt, target));
    optionsEl.appendChild(btn);
  });

  const nextBtn = document.getElementById("next-btn");
  nextBtn.disabled = true;
  nextBtn.textContent = currentIndex === 9 ? "결과 보기" : "다음 문제";

  renderMapHighlight(target);
}

function selectAnswer(btn, opt, target) {
  if (answered) return;
  answered = true;
  const buttons = document.querySelectorAll(".option-btn");
  buttons.forEach((b) => (b.disabled = true));

  if (opt.sggCode === target.sggCode) {
    btn.classList.add("correct");
    score += 10;
  } else {
    btn.classList.add("wrong");
    buttons.forEach((b) => { if (b.textContent === target.name) b.classList.add("correct"); });
  }
  document.getElementById("score-label").textContent = "점수 " + score;
  document.getElementById("next-btn").disabled = false;
}

function nextQuestion() {
  currentIndex++;
  if (currentIndex >= 10) showResult();
  else loadQuestion();
}

function showResult() {
  clearHighlight();
  document.getElementById("quiz-screen").classList.add("hidden");
  document.getElementById("result-screen").classList.remove("hidden");
  document.getElementById("final-score").textContent = score;
  const msg = score >= 90 ? "🏆 수도권 지리 마스터!" :
              score >= 70 ? "👍 훌륭해요!" :
              score >= 50 ? "🙂 절반은 넘겼어요." :
                            "📚 조금 더 연습해봐요!";
  document.getElementById("final-msg").textContent = msg;
}

=========================================================== */
window.addEventListener("load", async () => {
  if (typeof naver === "undefined" || !naver.maps) {
    document.getElementById("loading-text").textContent =
      "네이버 지도 인증 실패. 도메인 등록과 키를 확인하세요.";
    return;
  }
  try {
    initMap();
    await loadAllGeoData();
    document.getElementById("loading").classList.add("hidden");

    const missing = DB.filter((d) => !d.sggCode).map((d) => d.name);
    if (missing.length) {
      document.getElementById("diag").textContent =
        "⚠ 매칭 실패 (출제 제외): " + missing.join(", ");
      console.warn("sgg 코드 미발견:", missing);
    }
  } catch (e) {
    console.error(e);
    document.getElementById("loading-text").textContent = "데이터 로딩 실패: " + e.message;
    return;
  }

  document.getElementById("start-btn").addEventListener("click", startGame);
  document.getElementById("restart-btn").addEventListener("click", startGame);
  document.getElementById("next-btn").addEventListener("click", nextQuestion);
  document.getElementById("verify-btn").addEventListener("click", verifyAll);
});
</script>
