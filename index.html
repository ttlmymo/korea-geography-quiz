<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>수도권 지리 마스터 (진짜 정밀 지도 버전)</title>
    
    <!-- 🌟 Koder 앱의 웹뷰 차단을 완벽히 방어하고 백업을 갖춘 Leaflet CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f5f6fa;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background-color: #2c3e50;
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 1.1rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 1000;
        }

        /* 진짜 지도가 렌더링되는 넓은 화면 */
        #map {
            flex: 1;
            width: 100%;
            background-color: #f5f6fa; /* 지도 로딩 전 기본 배경 */
            z-index: 1;
        }

        /* 하단 퀴즈 레이아웃 */
        #quiz-container {
            background-color: white;
            padding: 15px 20px;
            box-sizing: border-box;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            box-shadow: 0 -3px 15px rgba(0,0,0,0.15);
            z-index: 1000;
            text-align: center;
            max-height: 52%;
            overflow-y: auto;
        }

        .question-box {
            background-color: #f8f9fa;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 12px;
            border-left: 5px solid #3498db;
        }

        .question-type-badge {
            display: inline-block;
            background-color: #3498db;
            color: white;
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 10px;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .question-text {
            font-size: 1.1rem;
            color: #2c3e50;
            font-weight: bold;
        }

        .question-desc {
            font-size: 0.85rem;
            color: #7f8c8d;
            margin-top: 4px;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 12px;
        }

        .option-btn {
            background-color: #ecf0f1;
            border: 1px solid #bdc3c7;
            padding: 11px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: bold;
            color: #2c3e50;
            cursor: pointer;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .option-btn.selected {
            background-color: #3498db;
            color: white;
            border-color: #2980b9;
        }

        .option-btn.correct-match {
            background-color: #2ecc71 !important;
            color: white !important;
            border-color: #27ae60 !important;
        }

        .option-btn.wrong-match {
            background-color: #e74c3c !important;
            color: white !important;
            border-color: #c0392b !important;
        }

        .action-btn {
            background-color: #e67e22;
            color: white;
            border: none;
            padding: 12px;
            font-size: 1rem;
            border-radius: 8px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            box-shadow: 0 3px 5px rgba(0,0,0,0.15);
            display: none;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: #7f8c8d;
            margin-top: 10px;
        }

        #result-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.7);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            width: 80%;
            max-width: 350px;
        }

        .score-text {
            font-size: 2.2rem;
            color: #27ae60;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .restart-btn {
            background-color: #2c3e50;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }
    </style>
</head>
<body>

    <header>🗺️ 수도권 지리 마스터 (복합 퀴즈)</header>

    <!-- 🌟 실제 세부 지형 지도가 로딩되는 영역 -->
    <div id="map"></div>

    <div id="quiz-container">
        <div class="question-box">
            <span class="question-type-badge" id="q-type-badge">유형</span>
            <div class="question-text" id="q-title">지도를 그리는 중입니다...</div>
            <div class="question-desc" id="q-desc">잠시만 기다려 주시면 정밀 지도가 나타납니다.</div>
        </div>
        
        <div class="options-grid" id="options-container"></div>

        <button class="action-btn" id="submit-btn" onclick="submitMultiAnswer()">정답 확인</button>

        <div class="status-bar">
            <span id="question-index">문제: 1 / 10</span>
            <span id="current-score">점수: 0점</span>
        </div>
    </div>

    <!-- 결과 모달 -->
    <div id="result-modal">
        <div class="modal-content">
            <h2>🎉 퀴즈 대종료!</h2>
            <div class="score-text" id="final-score">0점 / 100점</div>
            <p id="feedback-msg">고생하셨습니다!</p>
            <button class="restart-btn" onclick="restartQuiz()">다시 처음부터 하기</button>
        </div>
    </div>

    <!-- 🌟 Koder 앱의 차단을 우회하기 위해 무조건 동작하는 CDN으로 배치한 지도 엔진 JS -->
    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script>
        // --- 실제 수도권의 위도(lat), 경도(lng) 퀴즈 데이터셋 ---
        const originalQuizPool = [
            // 유형 1: 지도 보고 한 개 고르기 (single)
            {
                type: "single",
                title: "지도 빨간 원 영역에 있는 곳은?",
                desc: "실제 지도 지형과 강줄기, 도로망을 보고 동을 한 곳 선택하세요.",
                lat: 37.5255, lng: 126.9245, // 여의도 정확한 좌표
                correct: "여의도동 (서울 영등포구)",
                options: ["명동 (서울 중구)", "여의도동 (서울 영등포구)", "강남동 (서울 강남구)", "대학로 (서울 종로구)"]
            },
            {
                type: "single",
                title: "지도 빨간 원 영역에 있는 곳은?",
                desc: "실제 지도 지형과 강줄기, 도로망을 보고 동을 한 곳 선택하세요.",
                lat: 37.3850, lng: 126.6540, // 송도동
                correct: "송도동 (인천 연수구)",
                options: ["구월동 (인천 남동구)", "주안동 (인천 미추홀구)", "송도동 (인천 연수구)", "영종동 (인천 중구)"]
            },
            {
                type: "single",
                title: "지도 빨간 원 영역에 있는 곳은?",
                desc: "실제 지도 지형과 강줄기, 도로망을 보고 동을 한 곳 선택하세요.",
                lat: 37.3620, lng: 127.1130, // 분당 정자동
                correct: "정자동 (경기 성남시 분당구)",
                options: ["정자동 (경기 성남시 분당구)", "인계동 (경기 수원시 팔달구)", "백석동 (경기 고양시 일산동구)", "단원동 (경기 안산시)"]
            },
            {
                type: "single",
                title: "지도 빨간 원 영역에 있는 곳은?",
                desc: "실제 지도 지형과 강줄기, 도로망을 보고 동을 한 곳 선택하세요.",
                lat: 37.5794, lng: 126.8898, // 상암동
                correct: "상암동 (서울 마포구)",
                options: ["목동 (서울 양천구)", "상암동 (서울 마포구)", "신촌동 (서울 서대문구)", "성수동 (서울 성동구)"]
            },
            {
                type: "single",
                title: "지도 빨간 원 영역에 있는 곳은?",
                desc: "실제 지도 지형과 강줄기, 도로망을 보고 동을 한 곳 선택하세요.",
                lat: 37.5113, lng: 127.0596, // 삼성동
                correct: "삼성동 (서울 강남구)",
                options: ["성수동 (서울 성동구)", "삼성동 (서울 강남구)", "한남동 (서울 용산구)", "천호동 (서울 강동구)"]
            },
            {
                type: "single",
                title: "지도 빨간 원 영역에 있는 곳은?",
                desc: "실제 지도 지형과 강줄기, 도로망을 보고 동을 한 곳 선택하세요.",
                lat: 37.4925, lng: 126.9242, // 신대방동
                correct: "신대방동 (서울 동작구)",
                options: ["구로동 (서울 구로구)", "신대방동 (서울 동작구)", "봉천동 (서울 관악구)", "화곡동 (서울 강서구)"]
            },
            {
                type: "single",
                title: "지도 빨간 원 영역에 있는 곳은?",
                desc: "실제 지도 지형과 강줄기, 도로망을 보고 동을 한 곳 선택하세요.",
                lat: 37.4010, lng: 127.0990, // 판교동
                correct: "판교동 (경기 성남시 분당구)",
                options: ["광교동 (경기 수원시)", "별내동 (경기 남양주시)", "배곧동 (경기 시흥시)", "판교동 (경기 성남시 분당구)"]
            },

            // 유형 2: 구에 속하는 동 3개 찾기 (multi)
            {
                type: "multi",
                title: "📍 서울 마포구",
                desc: "아래 10개 동 중 이 지역(마포구)에 속하는 법정동 3개를 고르세요.",
                lat: 37.5622, lng: 126.9083,
                correct: ["상암동", "망원동", "공덕동"],
                wrong: ["목동", "여의도동", "성수동", "화곡동", "신도림동", "신촌동", "번동"]
            },
            {
                type: "multi",
                title: "📍 인천 연수구",
                desc: "아래 10개 동 중 이 지역(연수구)에 속하는 법정동 3개를 고르세요.",
                lat: 37.4093, lng: 126.6788,
                correct: ["송도동", "옥련동", "선학동"],
                wrong: ["구월동", "주안동", "부평동", "인현동", "계산동", "간석동", "숭의동"]
            },
            {
                type: "multi",
                title: "📍 경기 성남시 분당구",
                desc: "아래 10개 동 중 이 지역(분당구)에 속하는 법정동 3개를 고르세요.",
                lat: 37.3827, lng: 127.1189,
                correct: ["정자동", "판교동", "야탑동"],
                wrong: ["인계동", "상록동", "화정동", "철산동", "산본동", "풍덕천동", "마두동"]
            },
            {
                type: "multi",
                title: "📍 서울 강남구",
                desc: "아래 10개 동 중 이 지역(강남구)에 속하는 법정동 3개를 고르세요.",
                lat: 37.4960, lng: 127.0628,
                correct: ["역삼동", "압구정동", "개포동"],
                wrong: ["한남동", "잠실동", "방배동", "사당동", "천호동", "장안동", "혜화동"]
            },
            {
                type: "multi",
                title: "📍 경기 수원시 팔달구",
                desc: "아래 10개 동 중 이 지역(팔달구)에 속하는 법정동 3개를 고르세요.",
                lat: 37.2824, lng: 127.0190,
                correct: ["인계동", "우만동", "행궁동"],
                wrong: ["영통동", "호매실동", "정자동", "송죽동", "망포동", "조원동", "율전동"]
            },
            {
                type: "multi",
                title: "📍 인천 남동구",
                desc: "아래 10개 동 중 이 지역(남동구)에 속하는 법정동 3개를 고르세요.",
                lat: 37.4471, lng: 126.7314,
                correct: ["구월동", "간석동", "논현동"],
                wrong: ["송림동", "작전동", "검암동", "옥련동", "연희동", "학익동", "만석동"]
            },
            {
                type: "multi",
                title: "📍 서울 종로구",
                desc: "아래 10개 동 중 이 지역(종로구)에 속하는 법정동 3개를 고르세요.",
                lat: 37.5730, lng: 126.9794,
                correct: ["혜화동", "사직동", "인사동"],
                wrong: ["을지로동", "신당동", "회현동", "충정로동", "효창동", "보문동", "성북동"]
            }
        ];

        let activeQuizList = [];
        let currentQuestion = 0;
        let score = 0;
        let map;
        let currentMarker = null;
        let selectedAnswers = [];

        function initMap() {
            // 🌟 Koder 로컬 서버에서 지도 로딩 지연 현상을 막기 위한 세팅
            map = L.map('map', {
                zoomControl: false,
                minZoom: 10,
                maxZoom: 15
            }).setView([37.5665, 126.9780], 11);

            // 🌟 CDN을 사용하는 글씨 없는 진짜 지도 레이어 강제 삽입 (가장 안 끊기고 잘 연결되는 서버)
            L.tileLayer('https://basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
                attribution: '© OpenStreetMap, © CARTO',
                subdomains: 'abcd',
                timeout: 5000 // 튕김 방지
            }).addTo(map);

            setupGame();
        }

        function setupGame() {
            let shuffled = [...originalQuizPool].sort(() => Math.random() - 0.5);
            activeQuizList = shuffled.slice(0, 10);
            
            currentQuestion = 0;
            score = 0;
            loadQuestion();
        }

        function loadQuestion() {
            const data = activeQuizList[currentQuestion];
            selectedAnswers = [];

            // 1) 지도 마커 초기화
            if (currentMarker) {
                map.removeLayer(currentMarker);
            }

            // 2) 실제 위성/지리 지도 부드럽게 타겟 지점으로 이동
            map.flyTo([data.lat, data.lng], 13, {
                animate: true,
                duration: 1.2
            });

            // 3) 지도 위에 문제 범위 마킹
            if (data.type === 'single') {
                currentMarker = L.circle([data.lat, data.lng], {
                    color: '#e74c3c',
                    fillColor: '#ff7675',
                    fillOpacity: 0.5,
                    radius: 400 // 정확한 범위를 보여주기 위한 400m 정밀 서클
                }).addTo(map);
            } else {
                currentMarker = L.circle([data.lat, data.lng], {
                    color: '#3498db',
                    fillColor: '#85c1e9',
                    fillOpacity: 0.4,
                    radius: 2000 // 넓은 광역 구단위를 가리키는 2km 서클
                }).addTo(map);
            }

            // UI 연결
            const container = document.getElementById('options-container');
            const submitBtn = document.getElementById('submit-btn');
            const typeBadge = document.getElementById('q-type-badge');
            const titleEl = document.getElementById('q-title');
            const descEl = document.getElementById('q-desc');

            container.innerHTML = '';

            if (data.type === "single") {
                typeBadge.innerText = "유형 1: 단일 구역 맞추기";
                typeBadge.style.backgroundColor = "#e74c3c";
                titleEl.innerText = data.title;
                descEl.innerText = data.desc;
                submitBtn.style.display = "none";

                data.options.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.innerText = opt;
                    btn.onclick = () => checkSingleAnswer(btn, opt);
                    container.appendChild(btn);
                });
            } else {
                typeBadge.innerText = "유형 2: 구 소속 동 찾기";
                typeBadge.style.backgroundColor = "#2ecc71";
                titleEl.innerText = data.title;
                descEl.innerText = data.desc;
                
                submitBtn.innerText = "정답 확인";
                submitBtn.style.backgroundColor = "#e67e22";
                submitBtn.disabled = false;
                submitBtn.style.display = "block";

                let list = [...data.correct, ...data.wrong].sort(() => Math.random() - 0.5);
                list.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.innerText = opt;
                    btn.onclick = () => toggleMultiSelect(btn, opt);
                    container.appendChild(btn);
                });
            }

            document.getElementById('question-index').innerText = `문제: ${currentQuestion + 1} / 10`;
            document.getElementById('current-score').innerText = `점수: ${score}점`;
        }

        function checkSingleAnswer(button, selectedVal) {
            const data = activeQuizList[currentQuestion];
            const buttons = document.querySelectorAll('.option-btn');

            buttons.forEach(btn => btn.disabled = true);

            if (selectedVal === data.correct) {
                score += 10;
                button.style.backgroundColor = "#2ecc71";
                button.style.color = "white";
                alert("정답입니다! 🎉 (+10점)");
            } else {
                button.style.backgroundColor = "#e74c3c";
                button.style.color = "white";

                buttons.forEach(btn => {
                    if (btn.innerText === data.correct) {
                        btn.style.backgroundColor = "#2ecc71";
                        btn.style.color = "white";
                    }
                });
                alert(`틀렸습니다! 정답은 '${data.correct}' 입니다.`);
            }
            nextStep();
        }

        function toggleMultiSelect(button, val) {
            if (document.getElementById('submit-btn').disabled) return;

            const idx = selectedAnswers.indexOf(val);
            if (idx > -1) {
                selectedAnswers.splice(idx, 1);
                button.classList.remove('selected');
            } else {
                if (selectedAnswers.length >= 3) {
                    alert("정답은 최대 3개만 고를 수 있습니다!");
                    return;
                }
                selectedAnswers.push(val);
                button.classList.add('selected');
            }
        }

        function submitMultiAnswer() {
            if (selectedAnswers.length < 3) {
                alert("정답 동 3개를 전부 선택하셔야 합니다!");
                return;
            }

            const data = activeQuizList[currentQuestion];
            const buttons = document.querySelectorAll('.option-btn');
            const submitBtn = document.getElementById('submit-btn');
            let matched = 0;

            buttons.forEach(btn => {
                const text = btn.innerText;
                const isChosen = btn.classList.contains('selected');
                const isRealCorrect = data.correct.includes(text);

                btn.classList.remove('selected');

                if (isRealCorrect) {
                    btn.classList.add('correct-match');
                    if (isChosen) matched++;
                } else if (isChosen && !isRealCorrect) {
                    btn.classList.add('wrong-match');
                }
            });

            let pts = 0;
            if (matched === 3) pts = 10;
            else if (matched === 2) pts = 6;
            else if (matched === 1) pts = 3;

            score += pts;
            submitBtn.disabled = true;
            submitBtn.innerText = `채점 완료 (+${pts}점)`;
            submitBtn.style.backgroundColor = "#7f8c8d";

            alert(`정답 동을 ${matched}개 찾았습니다! (+${pts}점)`);
            nextStep();
        }

        function nextStep() {
            setTimeout(() => {
                currentQuestion++;
                if (currentQuestion < 10) {
                    loadQuestion();
                } else {
                    showFinalResult();
                }
            }, 2100);
        }

        function showFinalResult() {
            document.getElementById('final-score').innerText = `${score}점 / 100점`;
            let feedback = "";
            if (score >= 90) feedback = "진짜 대단하십니다! 수도권 지리 마스터 등극! 👑";
            else if (score >= 70) feedback = "대단히 멋진 성적입니다! 지리에 아주 밝으시네요! 👍";
            else if (score >= 40) feedback = "준수한 성적입니다! 조금만 더 공부하면 완벽하겠어요! 😄";
            else feedback = "지도를 보면서 구와 동의 관계를 조금 더 공부해 봐요! 🔥";
            
            document.getElementById('feedback-msg').innerText = feedback;
            document.getElementById('result-modal').style.display = 'flex';
        }

        function restartQuiz() {
            document.getElementById('result-modal').style.display = 'none';
            setupGame();
        }

        // 앱 구동 시 안전하게 지도를 먼저 로딩하도록 설정
        window.onload = initMap;
    </script>
</body>
</html>
