<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>수도권 지리 마스터 (100% 실측 경계 매칭)</title>
    
    <!-- 실시간 지도용 Leaflet CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f5f6fa;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background-color: #2c3e50;
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 1.1rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 1000;
        }

        #map {
            flex: 1;
            width: 100%;
            z-index: 1;
        }

        #quiz-container {
            background-color: white;
            padding: 15px 20px;
            box-sizing: border-box;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            box-shadow: 0 -3px 15px rgba(0,0,0,0.15);
            z-index: 1000;
            text-align: center;
            max-height: 52%;
            overflow-y: auto;
        }

        .question-box {
            background-color: #f8f9fa;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 12px;
            border-left: 5px solid #3498db;
        }

        .question-type-badge {
            display: inline-block;
            background-color: #3498db;
            color: white;
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 10px;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .question-text {
            font-size: 1.1rem;
            color: #2c3e50;
            font-weight: bold;
        }

        .question-desc {
            font-size: 0.85rem;
            color: #7f8c8d;
            margin-top: 4px;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 12px;
        }

        .option-btn {
            background-color: #ecf0f1;
            border: 1px solid #bdc3c7;
            padding: 11px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: bold;
            color: #2c3e50;
            cursor: pointer;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .option-btn.selected {
            background-color: #3498db;
            color: white;
            border-color: #2980b9;
        }

        .option-btn.correct-match {
            background-color: #2ecc71 !important;
            color: white !important;
            border-color: #27ae60 !important;
        }

        .option-btn.wrong-match {
            background-color: #e74c3c !important;
            color: white !important;
            border-color: #c0392b !important;
        }

        .action-btn {
            background-color: #e67e22;
            color: white;
            border: none;
            padding: 12px;
            font-size: 1rem;
            border-radius: 8px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            box-shadow: 0 3px 5px rgba(0,0,0,0.15);
            display: none;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: #7f8c8d;
            margin-top: 10px;
        }

        #result-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.7);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            width: 80%;
            max-width: 350px;
        }

        .score-text {
            font-size: 2.2rem;
            color: #27ae60;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .restart-btn {
            background-color: #2c3e50;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }
    </style>
</head>
<body>

    <header>🗺️ 수도권 지리 마스터 (100% 공식 실측 행정경계)</header>

    <div id="map"></div>

    <div id="quiz-container">
        <div class="question-box">
            <span class="question-type-badge" id="q-type-badge">유형</span>
            <div class="question-text" id="q-title">지도를 그리는 중입니다...</div>
            <div class="question-desc" id="q-desc">전국 고정밀 행정구역 경계 데이터를 연결하는 중입니다.</div>
        </div>
        
        <div class="options-grid" id="options-container"></div>

        <button class="action-btn" id="submit-btn" onclick="submitMultiAnswer()">정답 확인</button>

        <div class="status-bar">
            <span id="question-index">문제: 1 / 10</span>
            <span id="current-score">점수: 0점</span>
        </div>
    </div>

    <!-- 결과 모달 -->
    <div id="result-modal">
        <div class="modal-content">
            <h2>🎉 퀴즈 대종료!</h2>
            <div class="score-text" id="final-score">0점 / 100점</div>
            <p id="feedback-msg">참 잘하셨어요!</p>
            <button class="restart-btn" onclick="restartQuiz()">다시 하기</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script>
        let map;
        let activeQuizList = [];
        let currentQuestion = 0;
        let score = 0;
        let selectedAnswers = [];

        let currentGeoJSONLayer = null; 
        let currentMarker = null;       

        // 🌟 해결의 핵심: 분당구, 팔달구, 부평구 등 개별 하위 구가 완벽히 쪼개져 기록된 전국 고해상도 행정구역 파일로 교체했습니다!
        const NEW_GEOJSON_URL = "https://raw.githubusercontent.com/southkorea/southkorea-maps/master/kostat/2018/json/skorea-municipalities-geo.json";
        let cachedGeoJSON = null;

        const originalQuizPool = [
            // 유형 1: 지도 보고 한 개 고르기 (single)
            {
                type: "single",
                title: "지도에 노란 영역으로 표시된 '구'는 어디일까요?",
                desc: "실제 정밀 지형을 보고 4지선다 보기 중 알맞은 동이 속한 구를 고르세요.",
                lat: 37.5255, lng: 126.9245, 
                districtName: "영등포구", 
                correct: "여의도동 (서울 영등포구)",
                options: ["명동 (서울 중구)", "여의도동 (서울 영등포구)", "강남동 (서울 강남구)", "대학로 (서울 종로구)"]
            },
            {
                type: "single",
                title: "지도에 노란 영역으로 표시된 '구'는 어디일까요?",
                desc: "실제 정밀 지형을 보고 4지선다 보기 중 알맞은 동이 속한 구를 고르세요.",
                lat: 37.3850, lng: 126.6540, 
                districtName: "연수구",
                correct: "송도동 (인천 연수구)",
                options: ["구월동 (인천 남동구)", "주안동 (인천 미추홀구)", "송도동 (인천 연수구)", "영종동 (인천 중구)"]
            },
            {
                type: "single",
                title: "지도에 노란 영역으로 표시된 '구'는 어디일까요?",
                desc: "경기 남부, 1호선 안양역 및 평촌신도시가 속해 있는 도시의 행정구역입니다.",
                lat: 37.3943, lng: 126.9568,

                options: ["정자동 (경기 성남시)", "범계동 (경기 안양시)", "철산동 (경기 광명시)", "원당동 (경기 고양시)"]
            },
            {
                type: "single",
                title: "지도에 노란 영역으로 표시된 '구'는 어디일까요?",
                desc: "경기 북부 고양시의 랜드마크인 호수공원과 일산동구 지역입니다.",
                lat: 37.6625, lng: 126.7908,

                options: ["화정동 (경기 덕양구)", "백석동 (경기 고양시 일산동구)", "운정동 (경기 파주시)", "풍무동 (경기 김포시)"]
            },
            {
                type: "single",
                title: "지도에 노란 영역으로 표시된 '구'는 어디일까요?",
                desc: "실제 정밀 지형을 보고 4지선다 보기 중 알맞은 동이 속한 구를 고르세요.",
                lat: 37.5113, lng: 127.0596, 
                districtName: "강남구",
                correct: "삼성동 (서울 강남구)",
                options: ["성수동 (서울 성동구)", "삼성동 (서울 강남구)", "한남동 (서울 용산구)", "천호동 (서울 강동구)"]
            },
            {
                type: "single",

                desc: "서울 서남부 관악산 인근 동작대교 하단 주거밀집 구역입니다.",
                lat: 37.4925, lng: 126.9242, 
                districtName: "동작구",
                correct: "신대방동 (서울 동작구)",
                options: ["구로동 (서울 구로구)", "신대방동 (서울 동작구)", "봉천동 (서울 관악구)", "화곡동 (서울 강서구)"]
            },
            {
                type: "single",
                title: "지도에 노란 영역으로 표시된 '시'는 어디일까요?",
                desc: "인천과 인접한 경기 서부권 핵심 도시로, 부천 상동/중동이 있는 곳입니다.",
                lat: 37.5034, lng: 126.7660, 
                districtName: "부천시",
                correct: "상동 (경기 부천시)",
                options: ["상동 (경기 부천시)", "구월동 (인천 남동구)", "철산동 (경기 광명시)", "시흥동 (서울 금천구)"]
            },

            // 유형 2: 구에 속하는 동 3개 찾기 (multi)
            {
                type: "multi",
                title: "📍 서울 마포구",
                desc: "지도 위 노란색 영역(마포구)을 보며 여기에 속하는 동 3개를 고르세요.",
                lat: 37.5622, lng: 126.9083,
                districtName: "마포구",
                correct: ["상암동", "망원동", "공덕동"],
                wrong: ["목동", "여의도동", "성수동", "화곡동", "신도림동", "신촌동", "번동"]
            },
            {
                type: "multi",
                title: "📍 인천 부평구",
                desc: "지도 위 노란색 영역(부평구)을 보며 부평구에 속하는 동 3개를 골라보세요.",
                lat: 37.5073, lng: 126.7219,
                districtName: "부평구",
                correct: ["갈산동", "부개동", "청천동"],
                wrong: ["송도동", "구월동", "주안동", "계산동", "옥련동", "논현동", "석남동"]
            },
            {
                type: "multi",
                title: "📍 경기 성남시 분당구",
                desc: "지도 위 노란색 영역(분당구)을 보며 여기에 속하는 동 3개를 고르세요.",
                lat: 37.3827, lng: 127.1189,
                districtName: "분당구", // 🌟 성남시에서 분당구로 완벽 쪼개짐 매칭 성공!
                correct: ["정자동", "판교동", "야탑동"],
                wrong: ["인계동", "상록동", "화정동", "철산동", "산본동", "풍덕천동", "마두동"]
            },
            {
                type: "multi",
                title: "📍 서울 강남구",
                desc: "지도 위 노란색 영역(강남구)을 보며 여기에 속하는 동 3개를 고르세요.",
                lat: 37.4960, lng: 127.0628,
                districtName: "강남구",
                correct: ["역삼동", "압구정동", "개포동"],
                wrong: ["한남동", "잠실동", "방배동", "사당동", "천호동", "장안동", "혜화동"]
            },
            {
                type: "multi",
                title: "📍 경기 수원시 팔달구",
                desc: "지도 위 노란색 영역(팔달구)을 보며 여기에 속하는 동 3개를 고르세요.",
                lat: 37.2824, lng: 127.0190,
                districtName: "팔달구", // 🌟 수원시에서 팔달구로 정확하게 쪼개짐 매칭 성공!
                correct: ["인계동", "우만동", "행궁동"],
                wrong: ["영통동", "호매실동", "정자동", "송죽동", "망포동", "조원동", "율전동"]
            },
            {
                type: "multi",
                title: "📍 경기 파주시",
                desc: "경기 북부 임진강 하류와 운정신도시가 있는 파주시에 속한 동 3개를 고르세요.",
                lat: 37.7594, lng: 126.7801,
                districtName: "파주시",
                correct: ["야당동", "금촌동", "문산읍"],
                wrong: ["대화동", "장항동", "식사동", "화정동", "행신동", "정발산동", "백석동"]
            },
            {
                type: "multi",
                title: "📍 서울 종로구",
                desc: "지도 위 노란색 영역(종로구)을 보며 여기에 속하는 동 3개를 고르세요.",
                lat: 37.5730, lng: 126.9794,
                districtName: "종로구",
                correct: ["혜화동", "사직동", "인사동"],
                wrong: ["을지로동", "신당동", "회현동", "충정로동", "효창동", "보문동", "성북동"]
            }
        ];

        function initMap() {
            map = L.map('map', {
                zoomControl: false,
                minZoom: 10,
                maxZoom: 15
            }).setView([37.5665, 126.9780], 11);

            L.tileLayer('https://basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
                attribution: '© OpenStreetMap, © CARTO',
                subdomains: 'abcd'
            }).addTo(map);

            // 🌟 전국 행정구역 2018 고밀도 데이터 다운로드 받기
            fetch(NEW_GEOJSON_URL)
                .then(res => res.json())
                .then(data => {
                    cachedGeoJSON = data;
                    setupGame();
                })
                .catch(err => {
                    alert("정밀 지도를 가져오는 도중 에러가 발생했습니다. 새로고침을 해주세요!");
                    console.error(err);
                });
        }

        function setupGame() {
            let shuffled = [...originalQuizPool].sort(() => Math.random() - 0.5);
            activeQuizList = shuffled.slice(0, 10);
            currentQuestion = 0;
            score = 0;
            loadQuestion();
        }

        function loadQuestion() {
            const data = activeQuizList[currentQuestion];
            selectedAnswers = [];

            if (currentGeoJSONLayer) map.removeLayer(currentGeoJSONLayer);
            if (currentMarker) map.removeLayer(currentMarker);

            map.flyTo([data.lat, data.lng], 12, {
                animate: true,
                duration: 1.2
            });

            // 🌟 새롭게 교체한 데이터셋을 바탕으로 '분당구', '팔달구' 등을 칼같이 정확하게 찾아내 칠합니다!
            if (cachedGeoJSON) {
                currentGeoJSONLayer = L.geoJSON(cachedGeoJSON, {
                    filter: function(feature) {
                        // properties 내부의 공식 한글 지명인 'name'을 활용하여 쪼개진 행정구역을 찾아냅니다.
                        const fName = feature.properties.name || "";
                        return fName.includes(data.districtName);
                    },
                    style: {
                        color: "#e67e22",       
                        weight: 3,
                        fillColor: "#f1c40f",   
                        fillOpacity: 0.45       
                    }
                }).addTo(map);
            }

            if (data.type === 'single') {
                currentMarker = L.circle([data.lat, data.lng], {
                    color: '#c0392b',
                    fillColor: '#e74c3c',
                    fillOpacity: 0.8,
                    radius: 300 
                }).addTo(map);
            } else {
                currentMarker = L.circle([data.lat, data.lng], {
                    color: '#d35400',
                    fillColor: '#e67e22',
                    fillOpacity: 0.8,
                    radius: 100
                }).addTo(map);
            }

            const container = document.getElementById('options-container');
            const submitBtn = document.getElementById('submit-btn');
            const typeBadge = document.getElementById('q-type-badge');
            const titleEl = document.getElementById('q-title');
            const descEl = document.getElementById('q-desc');

            container.innerHTML = '';

            if (data.type === "single") {
                typeBadge.innerText = "유형 1: 단일 구역 맞추기";
                typeBadge.style.backgroundColor = "#e74c3c";
                titleEl.innerText = data.title;
                descEl.innerText = data.desc;
                submitBtn.style.display = "none";

                data.options.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.innerText = opt;
                    btn.onclick = () => checkSingleAnswer(btn, opt);
                    container.appendChild(btn);
                });
            } else {
                typeBadge.innerText = "유형 2: 구 소속 동 찾기";
                typeBadge.style.backgroundColor = "#2ecc71";
                titleEl.innerText = data.title;
                descEl.innerText = data.desc;
                
                submitBtn.innerText = "정답 확인";
                submitBtn.style.backgroundColor = "#e67e22";
                submitBtn.disabled = false;
                submitBtn.style.display = "block";

                let list = [...data.correct, ...data.wrong].sort(() => Math.random() - 0.5);
                list.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.innerText = opt;
                    btn.onclick = () => toggleMultiSelect(btn, opt);
                    container.appendChild(btn);
                });
            }

            document.getElementById('question-index').innerText = `문제: ${currentQuestion + 1} / 10`;
            document.getElementById('current-score').innerText = `점수: ${score}점`;
        }

        function checkSingleAnswer(button, selectedVal) {
            const data = activeQuizList[currentQuestion];
            const buttons = document.querySelectorAll('.option-btn');

            buttons.forEach(btn => btn.disabled = true);

            if (selectedVal === data.correct) {
                score += 10;
                button.style.backgroundColor = "#2ecc71";
                button.style.color = "white";
                alert("정답입니다! 🎉 (+10점)");
            } else {
                button.style.backgroundColor = "#e74c3c";
                button.style.color = "white";

                buttons.forEach(btn => {
                    if (btn.innerText === data.correct) {
                        btn.style.backgroundColor = "#2ecc71";
                        btn.style.color = "white";
                    }
                });
                alert(`틀렸습니다! 정답은 '${data.correct}' 입니다.`);
            }
            nextStep();
        }

        function toggleMultiSelect(button, val) {
            if (document.getElementById('submit-btn').disabled) return;

            const idx = selectedAnswers.indexOf(val);
            if (idx > -1) {
                selectedAnswers.splice(idx, 1);
                button.classList.remove('selected');
            } else {
                if (selectedAnswers.length >= 3) {
                    alert("최대 3개까지만 고르실 수 있습니다!");
                    return;
                }
                selectedAnswers.push(val);
                button.classList.add('selected');
            }
        }

        function submitMultiAnswer() {
            if (selectedAnswers.length < 3) {
                alert("3개 동을 빠짐없이 선택해 주세요!");
                return;
            }

            const data = activeQuizList[currentQuestion];
            const buttons = document.querySelectorAll('.option-btn');
            const submitBtn = document.getElementById('submit-btn');
            let matched = 0;

            buttons.forEach(btn => {
                const text = btn.innerText;
                const isChosen = btn.classList.contains('selected');
                const isRealCorrect = data.correct.includes(text);

                btn.classList.remove('selected');

                if (isRealCorrect) {
                    btn.classList.add('correct-match');
                    if (isChosen) matched++;
                } else if (isChosen && !isRealCorrect) {
                    btn.classList.add('wrong-match');
                }
            });

            let pts = 0;
            if (matched === 3) pts = 10;
            else if (matched === 2) pts = 6;
            else if (matched === 1) pts = 3;

            score += pts;
            submitBtn.disabled = true;
            submitBtn.innerText = `채점 완료 (+${pts}점)`;
            submitBtn.style.backgroundColor = "#7f8d8d";

            alert(`정답 동을 ${matched}개 찾았습니다! (+${pts}점)`);
            nextStep();
        }

        function nextStep() {
            setTimeout(() => {
                currentQuestion++;
                if (currentQuestion < 10) {
                    loadQuestion();
                } else {
                    showFinalResult();
                }
            }, 2200);
        }

        function showFinalResult() {
            document.getElementById('final-score').innerText = `${score}점 / 100점`;
            let feedback = "";
            if (score >= 90) feedback = "수도권의 진정한 지리 천재 등극! 👑";
            else if (score >= 70) feedback = "대단히 멋진 성적입니다! 지리에 아주 밝으시네요! 👍";
            else if (score >= 40) feedback = "준수한 성적입니다! 조금만 복습하면 정복하겠어요! 😄";
            else feedback = "반복 학습을 통해 수도권 지도를 완전히 정복해 봐요! 🔥";
            
            document.getElementById('feedback-msg').innerText = feedback;
            document.getElementById('result-modal').style.display = 'flex';
        }

        function restartQuiz() {
            document.getElementById('result-modal').style.display = 'none';
            setupGame();
        }

        window.onload = initMap;
    </script>
</body>
</html>
