<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>수도권 지리 마스터 (실제 지도 구/동 이중 시각화)</title>
    
    <!-- 실제 정밀 지도를 쓰기 위한 Leaflet CSS (보안 우회형 라이브러리) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f5f6fa;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background-color: #2c3e50;
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 1.1rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 1000;
        }

        /* 실제 지도 렌더링 영역 */
        #map {
            flex: 1;
            width: 100%;
            z-index: 1;
        }

        #quiz-container {
            background-color: white;
            padding: 15px 20px;
            box-sizing: border-box;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            box-shadow: 0 -3px 15px rgba(0,0,0,0.15);
            z-index: 1000;
            text-align: center;
            max-height: 52%;
            overflow-y: auto;
        }

        .question-box {
            background-color: #f8f9fa;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 12px;
            border-left: 5px solid #3498db;
        }

        .question-type-badge {
            display: inline-block;
            background-color: #3498db;
            color: white;
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 10px;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .question-text {
            font-size: 1.1rem;
            color: #2c3e50;
            font-weight: bold;
        }

        .question-desc {
            font-size: 0.85rem;
            color: #7f8c8d;
            margin-top: 4px;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 12px;
        }

        .option-btn {
            background-color: #ecf0f1;
            border: 1px solid #bdc3c7;
            padding: 11px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: bold;
            color: #2c3e50;
            cursor: pointer;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .option-btn.selected {
            background-color: #3498db;
            color: white;
            border-color: #2980b9;
        }

        .option-btn.correct-match {
            background-color: #2ecc71 !important;
            color: white !important;
            border-color: #27ae60 !important;
        }

        .option-btn.wrong-match {
            background-color: #e74c3c !important;
            color: white !important;
            border-color: #c0392b !important;
        }

        .action-btn {
            background-color: #e67e22;
            color: white;
            border: none;
            padding: 12px;
            font-size: 1rem;
            border-radius: 8px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            box-shadow: 0 3px 5px rgba(0,0,0,0.15);
            display: none;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: #7f8c8d;
            margin-top: 10px;
        }

        #result-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.7);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            width: 80%;
            max-width: 350px;
        }

        .score-text {
            font-size: 2.2rem;
            color: #27ae60;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .restart-btn {
            background-color: #2c3e50;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }
    </style>
</head>
<body>

    <header>🗺️ 수도권 지리 마스터 (진짜 지도 영역 매칭)</header>

    <!-- 🌟 실제 세부 지도가 로딩되는 영역 -->
    <div id="map"></div>

    <div id="quiz-container">
        <div class="question-box">
            <span class="question-type-badge" id="q-type-badge">유형</span>
            <div class="question-text" id="q-title">지도를 그리는 중입니다...</div>
            <div class="question-desc" id="q-desc">잠시만 기다려 주시면 실제 지도가 나타납니다.</div>
        </div>
        
        <div class="options-grid" id="options-container"></div>

        <button class="action-btn" id="submit-btn" onclick="submitMultiAnswer()">정답 확인</button>

        <div class="status-bar">
            <span id="question-index">문제: 1 / 10</span>
            <span id="current-score">점수: 0점</span>
        </div>
    </div>

    <!-- 결과 모달 -->
    <div id="result-modal">
        <div class="modal-content">
            <h2>🎉 퀴즈 종료!</h2>
            <div class="score-text" id="final-score">0점 / 100점</div>
            <p id="feedback-msg">참 잘하셨어요!</p>
            <button class="restart-btn" onclick="restartQuiz()">다시 하기</button>
        </div>
    </div>

                options: ["구로동 (서울 구로구)", "신대방동 (서울 동작구)", "봉천동 (서울 관악구)", "화곡동 (서울 강서구)"]
            },
            {
                type: "single",
                title: "지도에 노란 영역으로 표시된 '구'는 어디일까요?",
                desc: "실제 정밀 도로와 지형을 보고 4지선다 보기 중 알맞은 동이 속한 구를 고르세요.",
                lat: 37.4010, lng: 127.0990, // 판교동 중심
                district: "경기 성남시 분당구",
                correct: "판교동 (경기 성남시 분당구)",
                options: ["광교동 (경기 수원시)", "별내동 (경기 남양주시)", "배곧동 (경기 시흥시)", "판교동 (경기 성남시 분당구)"]
            },

            {
                type: "multi",

            },

                lat: 37.2824, lng: 127.0190,

                lat: 37.4471, lng: 126.7314,

            {

                lat: 37.5730, lng: 126.9794,
                district: "서울 종로구",
                correct: ["혜화동", "사직동", "인사동"],
                wrong: ["을지로동", "신당동", "회현동", "충정로동", "효창동", "보문동", "성북동"]
            }
        ];

        let activeQuizList = [];
        let currentQuestion = 0;
        let score = 0;
        let map;
        
        // 🌟 지도 위에 실시간으로 그려질 레이어들을 추적하는 변수
        let currentPolygon = null; // 구 영역 레이어
        let currentMarker = null;  // 정답 동 마커 레이어
        let selectedAnswers = [];

        function initMap() {
            // 실제 정밀 지도 렌더링
            map = L.map('map', {
                zoomControl: false,
                minZoom: 10,
                maxZoom: 15
            }).setView([37.5665, 126.9780], 11);

            // 글씨 없는 실제 세부 도로 지도 레이어 추가
            L.tileLayer('https://basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
                attribution: '© OpenStreetMap, © CARTO',
                subdomains: 'abcd'
            }).addTo(map);

            setupGame();
        }

        function setupGame() {
            let shuffled = [...originalQuizPool].sort(() => Math.random() - 0.5);
            activeQuizList = shuffled.slice(0, 10);
            currentQuestion = 0;
            score = 0;
            loadQuestion();
        }

        function loadQuestion() {
            const data = activeQuizList[currentQuestion];
            selectedAnswers = [];

            // 1) 이전 지도 레이어 싹 다 지우기
            if (currentPolygon) map.removeLayer(currentPolygon);
            if (currentMarker) map.removeLayer(currentMarker);

            // 2) 실제 지도를 타겟 위치로 웅장하게 이동
            map.flyTo([data.lat, data.lng], 12, {
                animate: true,
                duration: 1.2
            });

            // 3) 🌟 정답 구 전체 영역을 실제 지도 위에 다각형으로 노랗게 그리기
            const polyCoords = districtCoordinates[data.district];
            if (polyCoords) {
                currentPolygon = L.polygon(polyCoords, {
                    color: '#e67e22',       // 주황색 선
                    weight: 2,
                    fillColor: '#f1c40f',   // 노란색 영역
                    fillOpacity: 0.45       // 반투명 처리하여 도로가 다 비치게 함
                }).addTo(map);
            }

            // 4) 🌟 정답 동 세부 위치를 빨간 원 마커로 콕 찝어 정밀 표시
            if (data.type === 'single') {
                currentMarker = L.circle([data.lat, data.lng], {
                    color: '#c0392b',
                    fillColor: '#e74c3c',
                    fillOpacity: 0.8,
                    radius: 350 // 정확한 위치 350m 원
                }).addTo(map);
            } else {
                // 유형 2에서는 작은 점 가이드 형태로 표시
                currentMarker = L.circle([data.lat, data.lng], {
                    color: '#d35400',
                    fillColor: '#e67e22',
                    fillOpacity: 0.8,
                    radius: 100
                }).addTo(map);
            }

            // UI 구성
            const container = document.getElementById('options-container');
            const submitBtn = document.getElementById('submit-btn');
            const typeBadge = document.getElementById('q-type-badge');
            const titleEl = document.getElementById('q-title');
            const descEl = document.getElementById('q-desc');

            container.innerHTML = '';

            if (data.type === "single") {
                typeBadge.innerText = "유형 1: 단일 구역 맞추기";
                typeBadge.style.backgroundColor = "#e74c3c";
                titleEl.innerText = data.title;
                descEl.innerText = data.desc;
                submitBtn.style.display = "none";

                data.options.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.innerText = opt;
                    btn.onclick = () => checkSingleAnswer(btn, opt);
                    container.appendChild(btn);
                });
            } else {
                typeBadge.innerText = "유형 2: 구 소속 동 찾기";
                typeBadge.style.backgroundColor = "#2ecc71";
                titleEl.innerText = data.title;
                descEl.innerText = data.desc;
                
                submitBtn.innerText = "정답 확인";
                submitBtn.style.backgroundColor = "#e67e22";
                submitBtn.disabled = false;
                submitBtn.style.display = "block";

                let list = [...data.correct, ...data.wrong].sort(() => Math.random() - 0.5);
                list.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.innerText = opt;
                    btn.onclick = () => toggleMultiSelect(btn, opt);
                    container.appendChild(btn);
                });
            }

            document.getElementById('question-index').innerText = `문제: ${currentQuestion + 1} / 10`;
            document.getElementById('current-score').innerText = `점수: ${score}점`;
        }

        function checkSingleAnswer(button, selectedVal) {
            const data = activeQuizList[currentQuestion];
            const buttons = document.querySelectorAll('.option-btn');

            buttons.forEach(btn => btn.disabled = true);

            if (selectedVal === data.correct) {
                score += 10;
                button.style.backgroundColor = "#2ecc71";
                button.style.color = "white";
                alert("정답입니다! 🎉 (+10점)");
            } else {
                button.style.backgroundColor = "#e74c3c";
                button.style.color = "white";

                buttons.forEach(btn => {
                    if (btn.innerText === data.correct) {
                        btn.style.backgroundColor = "#2ecc71";
                        btn.style.color = "white";
                    }
                });
                alert(`틀렸습니다! 정답은 '${data.correct}' 입니다.`);
            }
            nextStep();
        }

        function toggleMultiSelect(button, val) {
            if (document.getElementById('submit-btn').disabled) return;

            const idx = selectedAnswers.indexOf(val);
            if (idx > -1) {
                selectedAnswers.splice(idx, 1);
                button.classList.remove('selected');
            } else {
                if (selectedAnswers.length >= 3) {
                    alert("최대 3개까지만 고르실 수 있습니다!");
                    return;
                }
                selectedAnswers.push(val);
                button.classList.add('selected');
            }
        }

        function submitMultiAnswer() {
            if (selectedAnswers.length < 3) {
                alert("3개 동을 빠짐없이 선택해 주세요!");
                return;
            }

            const data = activeQuizList[currentQuestion];
            const buttons = document.querySelectorAll('.option-btn');
            const submitBtn = document.getElementById('submit-btn');
            let matched = 0;

            buttons.forEach(btn => {
                const text = btn.innerText;
                const isChosen = btn.classList.contains('selected');
                const isRealCorrect = data.correct.includes(text);

                btn.classList.remove('selected');

                if (isRealCorrect) {
                    btn.classList.add('correct-match');
                    if (isChosen) matched++;
                } else if (isChosen && !isRealCorrect) {
                    btn.classList.add('wrong-match');
                }
            });

            let pts = 0;
            if (matched === 3) pts = 10;
            else if (matched === 2) pts = 6;
            else if (matched === 1) pts = 3;

            score += pts;
            submitBtn.disabled = true;
            submitBtn.innerText = `채점 완료 (+${pts}점)`;
            submitBtn.style.backgroundColor = "#7f8c8d";

            alert(`정답 동을 ${matched}개 찾았습니다! (+${pts}점)`);
            nextStep();
        }

        function nextStep() {
            setTimeout(() => {
                currentQuestion++;
                if (currentQuestion < 10) {
                    loadQuestion();
                } else {
                    showFinalResult();
                }
            }, 2200);
        }

        function showFinalResult() {
            document.getElementById('final-score').innerText = `${score}점 / 100점`;
            let feedback = "";
            if (score >= 90) feedback = "수도권의 진정한 지리 마스터 등극! 👑";
            else if (score >= 70) feedback = "대단히 멋진 성적입니다! 지리에 아주 밝으시네요! 👍";
            else if (score >= 40) feedback = "준수한 성적입니다! 조금만 복습하면 정복하겠어요! 😄";
            else feedback = "반복 학습을 통해 수도권 지도를 완전히 정복해 봐요! 🔥";
            
            document.getElementById('feedback-msg').innerText = feedback;
            document.getElementById('result-modal').style.display = 'flex';
        }

        function restartQuiz() {
            document.getElementById('result-modal').style.display = 'none';
            setupGame();
        }

        window.onload = initMap;
    </script>
</body>
</html>
