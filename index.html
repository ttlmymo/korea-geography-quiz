<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>수도권 지리 마스터 (구/동 이중 시각화 버전)</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f5f6fa;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background-color: #2c3e50;
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 1.1rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 1000;
        }

        #map-container {
            flex: 1;
            width: 100%;
            background-color: #a5ccf9; /* 파스텔 바다색 */
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #svg-map {
            width: 95%;
            height: 95%;
            max-width: 500px;
            max-height: 500px;
            filter: drop-shadow(0px 5px 8px rgba(0,0,0,0.15));
        }

        /* 구 영역 하이라이트 스타일 (부드러운 애니메이션) */
        .district-poly {
            transition: all 0.6s ease-in-out;
            pointer-events: none;
        }

        #quiz-container {
            background-color: white;
            padding: 15px 20px;
            box-sizing: border-box;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            box-shadow: 0 -3px 15px rgba(0,0,0,0.15);
            z-index: 1000;
            text-align: center;
            max-height: 52%;
            overflow-y: auto;
        }

        .question-box {
            background-color: #f8f9fa;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 12px;
            border-left: 5px solid #3498db;
        }

        .question-type-badge {
            display: inline-block;
            background-color: #3498db;
            color: white;
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 10px;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .question-text {
            font-size: 1.1rem;
            color: #2c3e50;
            font-weight: bold;
        }

        .question-desc {
            font-size: 0.85rem;
            color: #7f8c8d;
            margin-top: 4px;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 12px;
        }

        .option-btn {
            background-color: #ecf0f1;
            border: 1px solid #bdc3c7;
            padding: 11px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: bold;
            color: #2c3e50;
            cursor: pointer;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .option-btn.selected {
            background-color: #3498db;
            color: white;
            border-color: #2980b9;
        }

        .option-btn.correct-match {
            background-color: #2ecc71 !important;
            color: white !important;
            border-color: #27ae60 !important;
        }

        .option-btn.wrong-match {
            background-color: #e74c3c !important;
            color: white !important;
            border-color: #c0392b !important;
        }

        .action-btn {
            background-color: #e67e22;
            color: white;
            border: none;
            padding: 12px;
            font-size: 1rem;
            border-radius: 8px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            box-shadow: 0 3px 5px rgba(0,0,0,0.15);
            display: none;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: #7f8c8d;
            margin-top: 10px;
        }

        #result-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.7);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            width: 80%;
            max-width: 350px;
        }

        .score-text {
            font-size: 2.2rem;
            color: #27ae60;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .restart-btn {
            background-color: #2c3e50;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }
    </style>
</head>
<body>

    <header>🗺️ 수도권 지리 마스터 (구/동 이중 시각화)</header>

    <div id="map-container">

            <polygon id="poly-bd" class="district-poly" points="280,245 310,245 315,290 285,295" fill="none" />
            <!-- 서울 마포구 영역 -->
            <polygon id="poly-mp" class="district-poly" points="180,180 205,175 220,195 200,208 175,195" fill="none" />
            <!-- 서울 강남구 영역 -->
            <polygon id="poly-gn" class="district-poly" points="255,215 280,210 285,245 260,245" fill="none" />
            <!-- 서울 동작구 영역 -->
            <polygon id="poly-dj" class="district-poly" points="210,222 235,218 235,235 210,238" fill="none" />
            <!-- 수원 팔달구 영역 -->
            <polygon id="poly-pd" class="district-poly" points="255,330 290,330 290,365 255,365" fill="none" />
            <!-- 인천 남동구 영역 -->
            <polygon id="poly-nd" class="district-poly" points="115,200 145,200 140,230 115,225" fill="none" />
            <!-- 서울 종로구 영역 -->
            <polygon id="poly-jr" class="district-poly" points="220,160 250,155 250,180 220,180" fill="none" />

            <!-- 6. 퀴즈 정답 표시용 붉은 마커 (동 세부 위치) -->
            <circle id="target-marker" cx="250" cy="250" r="15" fill="#ff7675" fill-opacity="0.8" stroke="#e74c3c" stroke-width="3" style="transition: all 0.7s cubic-bezier(0.25, 1, 0.5, 1);" />
        </svg>
    </div>

    <div id="quiz-container">
        <div class="question-box">
            <span class="question-type-badge" id="q-type-badge">유형</span>
            <div class="question-text" id="q-title">질문 로딩 중...</div>
            <div class="question-desc" id="q-desc">잠시만 기다려 주세요.</div>
        </div>
        
        <div class="options-grid" id="options-container"></div>

        <button class="action-btn" id="submit-btn" onclick="submitMultiAnswer()">정답 확인</button>

        <div class="status-bar">
            <span id="question-index">문제: 1 / 10</span>
            <span id="current-score">점수: 0점</span>
        </div>
    </div>

    <div id="result-modal">
        <div class="modal-content">
            <h2>🎉 퀴즈 종료!</h2>
            <div class="score-text" id="final-score">0점 / 100점</div>
            <p id="feedback-msg">참 잘하셨어요!</p>
            <button class="restart-btn" onclick="restartQuiz()">다시 하기</button>
        </div>
    </div>

    <script>
        // --- 문제 세트 및 연동될 SVG Polygon ID 매칭 ---
        const originalQuizPool = [

            },

                x: 288, y: 262,

                correct: "판교동 (경기 성남시 분당구)",

            },
            {
                type: "multi",
                title: "📍 서울 강남구",
                desc: "강조된 강남구 영역을 보며 강남구의 진짜 법정동 3개를 골라주세요.",
                x: 265, y: 235,
                polyId: "poly-gn",
                correct: ["역삼동", "압구정동", "개포동"],
                wrong: ["한남동", "잠실동", "방배동", "사당동", "천호동", "장안동", "혜화동"]
            },
            {
                type: "multi",
                title: "📍 경기 수원시 팔달구",
                desc: "강조된 팔달구 영역을 보며 팔달구의 진짜 법정동 3개를 골라주세요.",
                x: 275, y: 350,
                polyId: "poly-pd", // 수원 팔달구
                correct: ["인계동", "우만동", "행궁동"],
                wrong: ["영통동", "호매실동", "정자동", "송죽동", "망포동", "조원동", "율전동"]
            },
            {
                type: "multi",
                title: "📍 인천 남동구",
                desc: "강조된 남동구 영역을 보며 남동구의 진짜 법정동 3개를 골라주세요.",
                x: 125, y: 210,
                polyId: "poly-nd", // 남동구
                correct: ["구월동", "간석동", "논현동"],
                wrong: ["송림동", "작전동", "검암동", "옥련동", "연희동", "학익동", "만석동"]
            },
            {
                type: "multi",
                title: "📍 서울 종로구",
                desc: "강조된 종로구 영역을 보며 종로구의 진짜 법정동 3개를 골라주세요.",
                x: 235, y: 172,
                polyId: "poly-jr", // 종로구
                correct: ["혜화동", "사직동", "인사동"],
                wrong: ["을지로동", "신당동", "회현동", "충정로동", "효창동", "보문동", "성북동"]
            }
        ];

        let activeQuizList = [];
        let currentQuestion = 0;
        let score = 0;
        let selectedAnswers = [];

        function setupGame() {
            let shuffled = [...originalQuizPool].sort(() => Math.random() - 0.5);
            activeQuizList = shuffled.slice(0, 10);
            currentQuestion = 0;
            score = 0;
            loadQuestion();
        }

        function loadQuestion() {
            const data = activeQuizList[currentQuestion];
            selectedAnswers = [];

            // 1) 지도의 모든 구 하이라이트 투명화(초기화)
            const polys = document.querySelectorAll('.district-poly');
            polys.forEach(p => {
                p.setAttribute('fill', 'none');
                p.setAttribute('stroke', 'none');
            });

            // 2) 이번 문제에 해당하는 구 전체를 연보라색(#a29bfe)으로 칠하고 점선 두르기
            if (data.polyId) {
                const targetPoly = document.getElementById(data.polyId);
                if (targetPoly) {
                    targetPoly.setAttribute('fill', '#d6ca9d'); // 고급스러운 황토/머스타드 강조색
                    targetPoly.setAttribute('fill-opacity', '0.6');
                    targetPoly.setAttribute('stroke', '#e67e22');
                    targetPoly.setAttribute('stroke-width', '1.5');
                }
            }

            // 3) 이번 정답 동의 세부 위치에 빨간 원 마커 놓기
            const marker = document.getElementById('target-marker');
            marker.setAttribute('cx', data.x);
            marker.setAttribute('cy', data.y);
            
            if (data.type === 'single') {
                marker.setAttribute('r', '11');
                marker.setAttribute('stroke', '#c0392b');
                marker.setAttribute('fill', '#e74c3c');
                marker.setAttribute('fill-opacity', '0.9');
            } else {
                // 유형 2에서는 마커를 아주 작게 가이드로만 남기거나 숨길 수 있게 5px 처리
                marker.setAttribute('r', '5');
                marker.setAttribute('stroke', '#e67e22');
                marker.setAttribute('fill', '#d35400');
                marker.setAttribute('fill-opacity', '1');
            }

            // UI 제어
            const container = document.getElementById('options-container');
            const submitBtn = document.getElementById('submit-btn');
            const typeBadge = document.getElementById('q-type-badge');
            const titleEl = document.getElementById('q-title');
            const descEl = document.getElementById('q-desc');

            container.innerHTML = '';

            if (data.type === "single") {
                typeBadge.innerText = "유형 1: 단일 구역 맞추기";
                typeBadge.style.backgroundColor = "#e74c3c";
                titleEl.innerText = data.title;
                descEl.innerText = data.desc;
                submitBtn.style.display = "none";

                data.options.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.innerText = opt;
                    btn.onclick = () => checkSingleAnswer(btn, opt);
                    container.appendChild(btn);
                });
            } else {
                typeBadge.innerText = "유형 2: 구 소속 동 찾기";
                typeBadge.style.backgroundColor = "#2ecc71";
                titleEl.innerText = data.title;
                descEl.innerText = data.desc;
                
                submitBtn.innerText = "정답 확인";
                submitBtn.style.backgroundColor = "#e67e22";
                submitBtn.disabled = false;
                submitBtn.style.display = "block";

                let list = [...data.correct, ...data.wrong].sort(() => Math.random() - 0.5);
                list.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.innerText = opt;
                    btn.onclick = () => toggleMultiSelect(btn, opt);
                    container.appendChild(btn);
                });
            }

            document.getElementById('question-index').innerText = `문제: ${currentQuestion + 1} / 10`;
            document.getElementById('current-score').innerText = `점수: ${score}점`;
        }

        function checkSingleAnswer(button, selectedVal) {
            const data = activeQuizList[currentQuestion];
            const buttons = document.querySelectorAll('.option-btn');

            buttons.forEach(btn => btn.disabled = true);

            if (selectedVal === data.correct) {
                score += 10;
                button.style.backgroundColor = "#2ecc71";
                button.style.color = "white";
                alert("정답입니다! 🎉 (+10점)");
            } else {
                button.style.backgroundColor = "#e74c3c";
                button.style.color = "white";

                buttons.forEach(btn => {
                    if (btn.innerText === data.correct) {
                        btn.style.backgroundColor = "#2ecc71";
                        btn.style.color = "white";
                    }
                });
                alert(`틀렸습니다! 정답은 '${data.correct}' 입니다.`);
            }
            nextStep();
        }

        function toggleMultiSelect(button, val) {
            if (document.getElementById('submit-btn').disabled) return;

            const idx = selectedAnswers.indexOf(val);
            if (idx > -1) {
                selectedAnswers.splice(idx, 1);
                button.classList.remove('selected');
            } else {
                if (selectedAnswers.length >= 3) {
                    alert("최대 3개까지만 고르실 수 있습니다!");
                    return;
                }
                selectedAnswers.push(val);
                button.classList.add('selected');
            }
        }

        function submitMultiAnswer() {
            if (selectedAnswers.length < 3) {
                alert("3개 동을 빠짐없이 선택해 주세요!");
                return;
            }

            const data = activeQuizList[currentQuestion];
            const buttons = document.querySelectorAll('.option-btn');
            const submitBtn = document.getElementById('submit-btn');
            let matched = 0;

            buttons.forEach(btn => {
                const text = btn.innerText;
                const isChosen = btn.classList.contains('selected');
                const isRealCorrect = data.correct.includes(text);

                btn.classList.remove('selected');

                if (isRealCorrect) {
                    btn.classList.add('correct-match');
                    if (isChosen) matched++;
                } else if (isChosen && !isRealCorrect) {
                    btn.classList.add('wrong-match');
                }
            });

            let pts = 0;
            if (matched === 3) pts = 10;
            else if (matched === 2) pts = 6;
            else if (matched === 1) pts = 3;

            score += pts;
            submitBtn.disabled = true;
            submitBtn.innerText = `채점 완료 (+${pts}점)`;
            submitBtn.style.backgroundColor = "#7f8c8d";

            alert(`정답 동을 ${matched}개 찾았습니다! (+${pts}점)`);
            nextStep();
        }

        function nextStep() {
            setTimeout(() => {
                currentQuestion++;
                if (currentQuestion < 10) {
                    loadQuestion();
                } else {
                    showFinalResult();
                }
            }, 2200);
        }

        function showFinalResult() {
            document.getElementById('final-score').innerText = `${score}점 / 100점`;
            let feedback = "";
            if (score >= 90) feedback = "수도권의 진정한 지리 천재 등극! 👑";
            else if (score >= 70) feedback = "대단히 멋진 성적입니다! 지리에 아주 밝으시네요! 👍";
            else if (score >= 40) feedback = "준수한 성적입니다! 조금만 복습하면 정복하겠어요! 😄";
            else feedback = "반복 학습을 통해 수도권 지도를 완전히 정복해 봐요! 🔥";
            
            document.getElementById('feedback-msg').innerText = feedback;
            document.getElementById('result-modal').style.display = 'flex';
        }

        function restartQuiz() {
            document.getElementById('result-modal').style.display = 'none';
            setupGame();
        }

        window.onload = setupGame;
    </script>
</body>
</html>
